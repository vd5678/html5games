<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TAMAGOTCHI</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#111;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  font-family:'Press Start 2P',monospace;
  user-select:none;
  touch-action:none;
  overflow:hidden;
}

/* ── 外殼：蛋形 ── */
#shell{
  position:relative;
  width:230px;
  height:290px;
  background:radial-gradient(ellipse at 40% 35%, #f5d96a 0%, #e8c030 55%, #c4960a 100%);
  border-radius: 50% 50% 50% 50% / 42% 42% 58% 58%;
  box-shadow:
    inset -6px -8px 16px rgba(0,0,0,0.25),
    inset 4px 4px 10px rgba(255,255,200,0.4),
    0 0 0 4px #b89020,
    0 8px 0 3px #8a6c10,
    0 10px 30px rgba(0,0,0,0.7);
  display:flex;
  flex-direction:column;
  align-items:center;
  padding-top:18px;
  gap:10px;
}

/* ── 警示燈 ── */
#alert-row{
  display:flex;
  width:190px;
  justify-content:flex-end;
  align-items:center;
}
#alert-light{
  width:12px;height:12px;
  border-radius:50%;
  background:#444;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.6);
  transition:background 0.15s, box-shadow 0.15s;
}
#alert-light.on{
  background:#ff3333;
  box-shadow:0 0 10px #ff3333, 0 0 20px #ff000055;
}

/* ── 螢幕外框 ── */
#screen-frame{
  width:190px;height:170px;
  background:#1a1a0e;
  border-radius:10px;
  border:5px solid #a07010;
  box-shadow:
    inset 0 3px 10px rgba(0,0,0,0.8),
    0 2px 6px rgba(255,220,60,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
}
#screen{
  width:168px;height:152px;
  background:#8fa85a;
  image-rendering:pixelated;
  display:block;
  border-radius:4px;
}

/* ── 狀態列 ── */
#status-bar{
  display:flex;
  width:190px;
  justify-content:space-around;
  align-items:center;
}
.stat-group{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.stat-label{
  font-size:5px;
  color:#6a4a08;
  letter-spacing:1px;
}
.hearts{display:flex;gap:2px;}
.heart{
  width:9px;height:9px;
  background:#c0392b;
  clip-path:polygon(50% 90%,0% 35%,15% 0%,50% 20%,85% 0%,100% 35%);
}
.heart.empty{background:#c0a060;opacity:0.5;}

/* ── 選單 icon 列 ── */
#menu-row{
  display:flex;
  gap:4px;
  width:190px;
  justify-content:center;
}
.menu-icon{
  width:23px;height:23px;
  border-radius:5px;
  background:#c8a030;
  border:2px solid #9a7010;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;
  cursor:pointer;
  position:relative;
  transition:transform 0.08s;
  box-shadow:0 2px 0 #7a5808;
}
.menu-icon:active{transform:translateY(2px);box-shadow:none;}
.menu-icon.selected{
  background:#fffde8;
  border-color:#c0392b;
  box-shadow:0 0 0 1px #c0392b, 0 2px 0 #7a5808;
}
.menu-icon.selected::after{
  content:'';
  position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:#c0392b;
}

/* ── 三顆按鈕 ── */
#btn-row{
  display:flex;
  gap:16px;
  align-items:center;
  margin-top:2px;
}
.btn{
  border:none;cursor:pointer;
  font-family:'Press Start 2P',monospace;
  color:#fff;
  border-radius:50%;
  transition:transform 0.07s,box-shadow 0.07s;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;
}
.btn:active{transform:translateY(3px);}
#btn-a{width:34px;height:34px;background:#c0392b;box-shadow:0 5px 0 #7a1a0a;}
#btn-a:active{box-shadow:0 2px 0 #7a1a0a;}
#btn-b{width:42px;height:42px;background:#2471a3;font-size:8px;box-shadow:0 5px 0 #12496a;}
#btn-b:active{box-shadow:0 2px 0 #12496a;}
#btn-c{width:34px;height:34px;background:#1e8449;box-shadow:0 5px 0 #0e4a24;}
#btn-c:active{box-shadow:0 2px 0 #0e4a24;}

/* ── 底列 ── */
#bottom-row{
  display:flex;gap:6px;align-items:center;
  margin-top:0;
}
.small-btn{
  font-size:5px;padding:3px 5px;
  background:#c8a030;border:2px solid #9a7010;border-radius:4px;
  color:#4a2e00;cursor:pointer;
  font-family:'Press Start 2P',monospace;
  box-shadow:0 2px 0 #7a5808;
}
.small-btn:active{transform:translateY(2px);box-shadow:none;}
.small-btn.active{background:#c0392b;color:#fff;border-color:#7a1a0a;}

/* ── 鍵盤 hint ── */
#keyhint{
  font-size:5px;color:#555;
  margin-top:8px;text-align:center;
  line-height:2;
  font-family:'Press Start 2P',monospace;
}

const S = 10; // 每像素放大倍數（14*10=140px）

function drawSprite(key, dx, dy, scale){
  scale = scale||S;
  const rows=SP[key];
  if(!rows)return;
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      const v=parseInt(row[c]);
      if(!v||!PAL[v])continue;
      ctx.fillStyle=PAL[v];
      ctx.fillRect(dx+c*scale,dy+r*scale,scale,scale);
    }
  }
}

// ── 迷你像素字型 ─────────────────────────────────────
const F5={
  '0':'0111010010100111',
  '1':'0101100010001001',
  '2':'0111000101100111',
  '3':'0111000100110111',
  '4':'0010001011110010',
  '5':'1111011110001110',
  '6':'0111010001110111',
  '7':'1111000100010001',
  '8':'0111010110110111',
  '9':'0111010111000111',
  'A':'0110110011101100',
  'B':'1110100111001110',
  'C':'0111100010000110',
  'D':'1110100110011110',
  'E':'1111100011001111',
  'F':'1111100011000000',
  'G':'0111100010110111',
  'H':'1001100111001001',
  'I':'0111001000100111',
  'K':'1001101011011001',
  'L':'1000100010001111',
  'M':'1001110111001001',
  'N':'1001110111011001',
  'O':'0111100110010110',
  'P':'1110100111000000',
  'R':'1110100111011001',
  'S':'0111100001100111',
  'T':'1110001000100010',
  'U':'1001100110010111',
  'V':'1001100101010010',
  'W':'1001100110111001',
  'X':'1001010100101001',
  'Y':'1001010100100010',
  'Z':'1111000100010111',
  ' ':'0000000000000000',
  ':':'0100000001000000',
  '-':'0000011100000000',
  '.':'0000000000000001',
  '!':'0100010001000010',
  '/':'0001001001001000',
};
function drawChar(ch,px,py,sc,col){
  sc=sc||1;col=col||'#1a1a1a';
  const bits=F5[ch.toUpperCase()];
  if(!bits)return (5+1)*sc;
  ctx.fillStyle=col;
  const rows=4,cols=bits.length/rows;
  for(let i=0;i<bits.length;i++){
    if(bits[i]==='1'){
      const c=i%cols,r=Math.floor(i/cols);
      ctx.fillRect(px+c*sc,py+r*sc,sc,sc);
    }
  }
  return (cols+1)*sc;
}
function drawText(str,px,py,sc,col){
  sc=sc||1;col=col||'#1a1a1a';
  let x=px;
  for(const ch of str) x+=drawChar(ch,x,py,sc,col);
}

// ── 狀態物件 ─────────────────────────────────────────
let pet = null;

function newPet(){
  return {
    stage:'egg',      // egg→baby→child→teen→adult→senior

    hunger:0,         // 0=飽 4=餓
    happy:4,
    weight:5,

    sick:false,
    sickPresses:0,    // 還需要按幾次藥
    poop:0,           // 便便數量 0-3

    poopWarnAge:0,    // 警告累計分鐘
    callAttn:false,   // 亮燈
    fakeAttn:false,   // 假呼叫（紀律機會）
    careMiss:0,
    hungerAcc:0,
    happyAcc:0,
    poopAcc:0,
    sickAcc:0,

}

const SAVE='tamagotchi_v2';
const save=()=>{try{localStorage.setItem(SAVE,JSON.stringify(pet));}catch(e){}};
function loadPet(){
  try{
    const d=localStorage.getItem(SAVE);
    if(d){pet=JSON.parse(d);return true;}
  }catch(e){}
  return false;
}

// ── UI 狀態 ───────────────────────────────────────────
const MENUS=['food','light','play','meds','toilet','status','discipline'];
let menuIdx=0, menuOpen=false, subIdx=0;
let showStat=false;
let playState=null; // null | {phase,pChoice,cChoice,result}
let animF=0, blinkOn=true, blinkT=0;

// ── 成長閥值（ageDays）───────────────────────────────
const STAGE_DAYS={baby:0,child:1,teen:3,adult:6,senior:10};
const NEXT_STAGE={egg:'baby',baby:'child',child:'teen',teen:'adult',adult:'senior'};

// ── 夜間判斷 ────────────────────────────────────────
const isSleepTime=()=>{const h=new Date().getHours();return h>=SLEEP_START||h<SLEEP_END;};

// ── 離線補算 ─────────────────────────────────────────
function applyOffline(){
  if(!pet||pet.dead||pet.stage==='egg')return;
  const now=Date.now();
  const raw=now-(pet.lastTs||now);
  if(raw<=0){pet.lastTs=now;return;}
  // 超過 grace 的才算
  const eff=Math.max(0,raw-OFFLINE_GRACE);
  if(eff<=0){pet.lastTs=now;return;}
  const gm=(eff/1000/60)*(FAST_MODE?60:1)*0.6;
  pet.ageMin+=gm;
  pet.hungerAcc+=gm;
  const hT=Math.floor(pet.hungerAcc/HUNGER_DECAY);
  pet.hungerAcc%=HUNGER_DECAY;
  pet.hunger=Math.min(4,pet.hunger+hT);
  pet.happyAcc+=gm;
  const aT=Math.floor(pet.happyAcc/HAPPY_DECAY);
  pet.happyAcc%=HAPPY_DECAY;
  pet.happy=Math.max(0,pet.happy-aT);
  recalcAttn();
  pet.lastTs=now;
}

// ── 主 Tick ──────────────────────────────────────────
function tick(){
  animF++;
  blinkT++;
  if(blinkT>=14){blinkOn=!blinkOn;blinkT=0;}

  if(!pet){render();return;}
  if(pet.dead){animF%2===0&&save();render();return;}

  // 蛋
  if(pet.stage==='egg'){
    pet.ageMin+=mpt();
    if(pet.ageMin>=60*24) hatch();
    else{save();render();}
    return;
  }

  const sleeping=isSleepTime();
  pet.sleeping=sleeping;

  if(!sleeping){
    const m=mpt();
    pet.ageMin+=m;

    // 飢餓
    pet.hungerAcc+=m;
    if(pet.hungerAcc>=HUNGER_DECAY){
      pet.hungerAcc-=HUNGER_DECAY;
      if(pet.hunger<4){pet.hunger++;}
      if(pet.hunger>=4){pet.callAttn=true;pet.careMiss++;}
    }

    // 快樂
    pet.happyAcc+=m;
    if(pet.happyAcc>=HAPPY_DECAY){
      pet.happyAcc-=HAPPY_DECAY;
      if(pet.happy>0){pet.happy--;}
      if(pet.happy<=0){pet.callAttn=true;pet.careMiss++;}
    }

    // 便便流程
    pet.poopAcc+=m;
    if(!pet.poopWarn&&pet.poopAcc>=POOP_INTERVAL&&pet.poop<3){
      pet.poopAcc=0;
      pet.poopWarn=true;
      pet.poopWarnAge=0;
      pet.callAttn=true;
      sfx('alert');
    }
    if(pet.poopWarn){
      pet.poopWarnAge+=m;
      if(pet.poopWarnAge>=POOP_WARN_TTL){
        // 真的拉了
        pet.poopWarn=false;
        pet.poopWarnAge=0;
        pet.poop=Math.min(pet.poop+1,3);
        // 有便便就有機會生病
        if(pet.poop>=2&&!pet.sick){
          pet.sick=true;
          pet.sickPresses=1+Math.floor(Math.random()*2);
        }
        recalcAttn();
      }
    }

    // 疾病計時
    if(pet.sick){
      pet.sickAcc+=m;
      if(pet.sickAcc>=240){die(false);return;}
    }else{
      pet.sickAcc=0;
    }

    // 體重過重生病
    if(pet.weight>12&&!pet.sick&&Math.random()<0.003){
      pet.sick=true;
      pet.sickPresses=1+Math.floor(Math.random()*2);
      recalcAttn();
    }

    // 假呼叫（紀律機會）
    pet.fakeAcc+=m;
    if(!pet.fakeAttn&&!pet.callAttn&&pet.fakeAcc>180+Math.random()*120){
      pet.fakeAcc=0;
      pet.fakeAttn=true;
      pet.callAttn=true;
      sfx('alert');
    }

    // 成長
    checkGrowth();
  }

  save();
  render();
  renderHUD();
}

function hatch(){
  pet.stage='baby';
  pet.ageMin=0;
  pet.hunger=1;pet.happy=3;
  sfx('hatch');save();
}

function checkGrowth(){
  const ageDays=pet.ageMin/(60*24);
  const next=NEXT_STAGE[pet.stage];
  if(!next)return;
  const need=STAGE_DAYS[next];
  if(need===undefined)return;
  if(ageDays>=need){
    // Senior 到了一定壽命 → 自然死（天使）
    if(pet.stage==='senior'&&ageDays>=STAGE_DAYS.senior+5){
      die(true);return;
    }
    if(pet.stage!=='senior'){
      const good=pet.careMiss<=CARE_MISS_MAX;
      pet.variant=good?'good':'bad';
      pet.stage=next;
      pet.careMiss=0;
      sfx('evolve');
    }
  }
}

function die(natural){
  pet.dead=true;
  pet.angel=natural;
  sfx('dead');
  save();
  render();
}

function recalcAttn(){
  pet.callAttn=(pet.hunger>=4||pet.happy<=0||pet.sick||pet.poop>0||pet.poopWarn||pet.fakeAttn);
}

// ── 照顧動作 ─────────────────────────────────────────
function actFeed(snack){
  if(!pet||pet.dead||pet.sleeping||pet.sick)return;
  if(snack){if(pet.happy<4)pet.happy++;pet.weight+=1;}
  else{if(pet.hunger>0){pet.hunger--;pet.weight+=1;}}
  sfx('eat');
  recalcAttn();save();render();renderHUD();
}
function actMeds(){
  if(!pet||pet.dead||!pet.sick)return;
  pet.sickPresses--;
  if(pet.sickPresses<=0){
    pet.sick=false;pet.sickAcc=0;pet.sickPresses=0;
    sfx('meds');
  }else{
    sfx('click');
  }
  recalcAttn();save();render();renderHUD();
}
function actToilet(){
  if(!pet||pet.dead)return;
  pet.poopWarn=false;pet.poopWarnAge=0;
  pet.poop=0;
  recalcAttn();sfx('clean');save();render();renderHUD();
}
function actDiscipline(){
  if(!pet||pet.dead)return;
  if(pet.fakeAttn){
    // 正確出手：增加紀律
    pet.fakeAttn=false;
    pet.callAttn=false;
    if(pet.discipline<4)pet.discipline++;
    sfx('scold');
    render();renderHUD();
  }else if(pet.callAttn&&(pet.hunger>=4||pet.happy<=0)){
    // 真需求時懲罰 → careMiss
    pet.careMiss++;
    sfx('scold');
  }else{
    sfx('click');
  }
  recalcAttn();save();
}

// ── 猜拳 ────────────────────────────────────────────
function startPlay(){
  if(!pet||pet.dead||pet.sleeping||pet.sick)return;
  playState={phase:'choose',pChoice:0,cChoice:0,result:null};
  subIdx=0;menuOpen=false;
  render();
}
function resolvePlay(){
  const p=playState.pChoice;
  const c=Math.floor(Math.random()*3);
  playState.cChoice=c;
  // 0=Paper 1=Rock 2=Scissors；Paper>Rock, Rock>Scissors, Scissors>Paper
  let res='draw';
  if((p===0&&c===1)||(p===1&&c===2)||(p===2&&c===0))res='win';
  else if(p!==c)res='lose';
  playState.result=res;
  playState.phase='result';
  if(res==='win'&&pet.happy<4){pet.happy++;sfx('win');}
  else sfx(res==='lose'?'lose':'click');
  recalcAttn();save();
}

// ── 畫面渲染 ─────────────────────────────────────────
function sprKey(){
  if(!pet)return'egg';
  if(pet.dead)return pet.angel?'angel':'skull';
  if(pet.stage==='egg')return'egg';
  if(pet.stage==='baby')return'baby';
  return pet.stage+'_'+(pet.variant||'good');
}

function bg(dark){
  ctx.fillStyle=dark?LCD_DARK:LCD_LIGHT;
  ctx.fillRect(0,0,W,H);
}

function render(){
  if(!pet){drawStart();return;}
  if(pet.dead){pet.angel?drawAngel():drawDead();return;}
  if(pet.stage==='egg'){drawEgg();return;}
  if(pet.sleeping){drawSleep();return;}
  if(playState){drawPlay();return;}
  if(showStat){drawStatus();return;}
  if(menuOpen){drawSubMenu();return;}
  drawMain();
}

function drawStart(){
  bg();
  drawSprite('egg',14,10,5);
  drawText('PRESS B',28,110,2);
  drawText('TO START',22,128,1);
}

function drawEgg(){
  bg();
  const ex=(W-14*S)/2, ey=14;
  // 隨機抖動
  const jx=(animF%20<3)?-S:0;
  drawSprite('egg',ex+jx,ey);
  const pct=Math.min(1,pet.ageMin/(60*24));
  const bw=Math.floor(pct*120);
  ctx.fillStyle='#4a4a30';ctx.fillRect(20,H-20,120,8);
  ctx.fillStyle='#c8e040';ctx.fillRect(20,H-20,bw,8);
  drawText('HATCH',36,H-34,1);
}

function drawMain(){
  bg(pet.sleeping);
  const sk=sprKey();
  // 走路擺動
  const wb=(animF%20<10)?-1:1;
  const ex=Math.floor((W-14*S)/2)+wb*S;
  const ey=10;

  if(pet.poopWarn&&animF%16<8){
    // 苦臉：繪製精靈後加深色 tint
    drawSprite(sk,ex,ey);
    ctx.fillStyle='rgba(100,60,0,0.3)';
    ctx.fillRect(ex,ey,14*S,14*S);
    // 臭臭符號
    drawSprite('stink',4,4,8);
    drawSprite('stink',W-4-14*8,4,8);
  }else{
    drawSprite(sk,ex,ey);
  }

  // 病符
  if(pet.sick&&blinkOn){
    drawSprite('sick',4,4,8);
  }

  // 便便
  for(let i=0;i<pet.poop;i++){
    drawSprite('poop',4+i*26,H-34,10);
  }

  // 呼叫注意感嘆號
  if(pet.callAttn&&blinkOn){
    ctx.fillStyle='#c0392b';
    ctx.fillRect(W-18,4,10,16);
    ctx.fillRect(W-18,22,10,6);
  }

  // 年齡
  const ageDays=(pet.ageMin/(60*24)).toFixed(1);
  drawText('AGE '+ageDays,4,4,1);
}

function drawSleep(){
  bg(true);
  drawSprite(sprKey(),Math.floor((W-14*S)/2),12);
  if(blinkOn){
    drawText('Z',W-36,18,4,LCD_LIGHT);
    drawText('Z',W-24,10,3,LCD_LIGHT);
    drawText('Z',W-16,4,2,LCD_LIGHT);
  }
  drawText('SLEEP',42,H-18,1,LCD_LIGHT);
}

function drawSubMenu(){
  bg();
  const m=MENUS[menuIdx];
  const T={food:'FEED',light:'LIGHT',play:'GAME',meds:'MEDS',toilet:'CLEAN',status:'STATUS',discipline:'SCOLD'};
  drawText(T[m]||m,36,8,2);
  ctx.fillStyle='#2a2a10';ctx.fillRect(4,26,W-8,2);
  if(m==='food'){
    ['MEAL','SNACK'].forEach((it,i)=>{
      if(i===subIdx){
        ctx.fillStyle='#1a1a1a';ctx.fillRect(20,44+i*40,128,28);
        drawText(it,24,52+i*40,2,'#8fa85a');
      }else drawText(it,24,52+i*40,2,'#1a1a1a');
    });
  }
}

function drawStatus(){
  bg();
  drawText('STATUS',30,4,2);
  ctx.fillStyle='#2a2a10';ctx.fillRect(4,22,W-8,2);
  const ageDays=(pet.ageMin/(60*24)).toFixed(1);
  [
    ['AGE',ageDays+'d'],
    ['WT', pet.weight+'g'],
    ['HNGR',(4-pet.hunger)+'/4'],
    ['HPPY',pet.happy+'/4'],
    ['DISC',pet.discipline+'/4'],
    ['SICK',pet.sick?'YES':'NO'],
  ].forEach(([l,v],i)=>{
    drawText(l,8,28+i*18,1);
    drawText(v,106,28+i*18,1);
  });
}

function drawPlay(){
  bg();
  const ps=playState;
  if(ps.phase==='choose'){
    drawText('GUESS!',38,6,2);
    ctx.fillStyle='#2a2a10';ctx.fillRect(4,24,W-8,2);
    ['PAPER','ROCK ','SCISS'].forEach((o,i)=>{
      if(i===subIdx){
        ctx.fillStyle='#1a1a1a';ctx.fillRect(18,32+i*36,132,28);
        drawText(o,22,40+i*36,2,'#8fa85a');
      }else drawText(o,22,40+i*36,2,'#1a1a1a');
    });
    drawText('A:PREV B:OK',14,H-16,1);
  }else{
    const N=['PAPER','ROCK ','SCISS'];
    drawText('YOU:'+N[ps.pChoice],8,14,1);
    drawText('CPU:'+N[ps.cChoice],8,30,1);
    ctx.fillStyle='#2a2a10';ctx.fillRect(4,44,W-8,2);
    const pal={win:'#1e8449',lose:'#c0392b',draw:'#7d6608'};
    ctx.fillStyle=pal[ps.result]||'#888';
    ctx.fillRect(28,52,112,44);
    drawText(ps.result.toUpperCase(),ps.result==='draw'?36:40,70,3,'#fff');
    drawText('B:NEXT',42,H-16,1);
  }
}

function drawDead(){
  bg();
  // 骷髏居中
  drawSprite('skull',Math.floor((W-14*S)/2),14);
  // 墓碑小圖（像素畫）
  ctx.fillStyle=PAL[1];
  ctx.fillRect(62,H-36,44,28);  // 碑底
  ctx.fillRect(66,H-48,36,14);  // 碑上圓弧（矩形近似）
  ctx.fillRect(72,H-56,24,10);
  ctx.fillStyle=LCD_LIGHT;
  ctx.fillRect(70,H-44,28,20);  // 刻字區
  if(blinkOn) drawText('RIP',74,H-40,2,'#2a2a10');
  drawText('B:RETRY',26,6,1);
}

function drawAngel(){
  bg();
  const fy=10+Math.sin(animF*0.07)*8;
  drawSprite('angel',Math.floor((W-14*S)/2),Math.floor(fy));
  if(blinkOn) drawText('GOODBYE!',18,H-18,2);
}

// ── HUD ─────────────────────────────────────────────
function renderHUD(){
  if(!pet)return;
  ['hunger','happy'].forEach(key=>{
    const el=document.getElementById(key+'-hearts');
    if(!el)return;
    el.innerHTML='';
    for(let i=0;i<4;i++){
      const d=document.createElement('div');
      const filled=key==='hunger'?(i<4-pet.hunger):(i<pet.happy);
      d.className='heart'+(filled?'':' empty');
      el.appendChild(d);
    }
  });
  const al=document.getElementById('alert-light');
  if(al) al.className=(pet.callAttn||pet.sick)?'on':'';
}

function renderIcons(){
  document.querySelectorAll('.menu-icon').forEach((el,i)=>{
    el.classList.toggle('selected',i===menuIdx);
  });
}

// ── 音效 ────────────────────────────────────────────
let AC=null, muted=false;
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}
function beep(freq,dur,v,type){
  if(muted)return;
  try{
    const ac=getAC();if(!ac)return;
    if(ac.state==='suspended')ac.resume();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(v||0.1,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+dur+0.02);
  }catch(e){}
}
function sfx(t){
  if(muted)return;
  const seq=(arr,d)=>arr.forEach(([f,delay])=>setTimeout(()=>beep(f,d),delay));
  switch(t){
    case 'eat':    beep(880,0.07);break;
    case 'hatch':  seq([[523,0],[659,100],[784,200],[1047,300]],0.12);break;
    case 'evolve': seq([[523,0],[659,90],[784,180],[1047,270],[1319,360]],0.13);break;
    case 'dead':   seq([[440,0],[330,160],[220,320],[147,480]],0.28,'sawtooth');break;
    case 'meds':   beep(660,0.08);setTimeout(()=>beep(880,0.1),110);break;
    case 'clean':  beep(440,0.06);setTimeout(()=>beep(660,0.06),90);break;
    case 'scold':  beep(200,0.15,'sawtooth');break;
    case 'click':  beep(600,0.04);break;
    case 'win':    seq([[784,0],[1047,70],[1319,140]],0.1);break;
    case 'lose':   beep(294,0.2,'sawtooth');break;
    case 'alert':  [0,150].forEach(d=>setTimeout(()=>beep(880,0.06),d));break;
  }
}

// ── 按鈕邏輯 ────────────────────────────────────────
function pressA(){
  getAC();
  if(!pet||pet.dead)return;
  if(playState&&playState.phase==='choose'){subIdx=(subIdx+2)%3;render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food')subIdx=(subIdx+1)%2;
    render();return;
  }
  menuIdx=(menuIdx+MENUS.length-1)%MENUS.length;
  renderIcons();render();
}
function pressB(){
  getAC();
  if(!pet){pet=newPet();save();render();return;}
  if(pet.dead){pet=newPet();save();render();renderHUD();return;}
  if(playState){
    if(playState.phase==='choose'){playState.pChoice=subIdx;resolvePlay();render();}
    else{playState=null;render();}
    return;
  }
  if(showStat){showStat=false;render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food')actFeed(subIdx===1);
    menuOpen=false;render();renderHUD();return;
  }
  const m=MENUS[menuIdx];
  if(m==='status'){showStat=true;render();return;}
  if(m==='play'){startPlay();return;}
  if(m==='food'){menuOpen=true;subIdx=0;render();return;}
  if(m==='light'){sfx('click');}
  if(m==='meds')actMeds();
  if(m==='toilet')actToilet();
  if(m==='discipline')actDiscipline();
  render();renderHUD();
}
function pressC(){
  getAC();
  if(!pet||pet.dead)return;
  if(playState){playState=null;render();return;}
  if(menuOpen){menuOpen=false;render();return;}
  if(showStat){showStat=false;render();return;}
  menuIdx=(menuIdx+1)%MENUS.length;
  renderIcons();render();
}

// ── A+C 同時按重置 ────────────────────────────────────
let aDown=false,cDown=false,resetTimer=null;
function tryReset(){
  if(aDown&&cDown){
    resetTimer=setTimeout(()=>{
      if(aDown&&cDown){
        localStorage.removeItem(SAVE);
        pet=null;aDown=false;cDown=false;
        render();
        const el=document.getElementById('hunger-hearts');
        if(el) el.innerHTML='';
        const el2=document.getElementById('happy-hearts');
        if(el2) el2.innerHTML='';
      }
    },1000);
  }
}
function cancelReset(){clearTimeout(resetTimer);}

document.getElementById('btn-a').addEventListener('mousedown',()=>{aDown=true;tryReset();});
document.getElementById('btn-a').addEventListener('mouseup',()=>{aDown=false;cancelReset();});
document.getElementById('btn-c').addEventListener('mousedown',()=>{cDown=true;tryReset();});
document.getElementById('btn-c').addEventListener('mouseup',()=>{cDown=false;cancelReset();});
document.getElementById('btn-a').addEventListener('click',pressA);
document.getElementById('btn-b').addEventListener('click',pressB);
document.getElementById('btn-c').addEventListener('click',pressC);

// touch
['a','b','c'].forEach(id=>{
  const el=document.getElementById('btn-'+id);
  el.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(id==='a'){aDown=true;tryReset();pressA();}
    if(id==='b') pressB();
    if(id==='c'){cDown=true;tryReset();pressC();}
  },{passive:false});
  el.addEventListener('touchend',()=>{
    if(id==='a'){aDown=false;cancelReset();}
    if(id==='c'){cDown=false;cancelReset();}
  });
});

// icon 點擊
document.querySelectorAll('.menu-icon').forEach((el,i)=>{
  el.addEventListener('click',()=>{
    menuIdx=i;renderIcons();
    pressB();
  });
});
// icon hover
document.querySelectorAll('.menu-icon').forEach((el,i)=>{
  el.addEventListener('mouseenter',()=>{
    menuIdx=i;renderIcons();render();
  });
});

// 靜音
document.getElementById('btn-mute').addEventListener('click',()=>{
  muted=!muted;
  document.getElementById('btn-mute').classList.toggle('active',muted);
});

// 快速模式
document.getElementById('btn-fast').addEventListener('click',()=>{
  FAST_MODE=!FAST_MODE;
  document.getElementById('btn-fast').classList.toggle('active',FAST_MODE);
  if(pet){pet.fastMode=FAST_MODE;save();}
});

// 鍵盤
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k==='ArrowLeft'||k==='a')pressA();
  else if(k==='ArrowRight'||k==='c')pressC();
  else if(k==='Enter'||k===' '||k==='b')pressB();
  // A+C via keyboard
  if(k==='a'||k==='A'){aDown=true;tryReset();}
  if(k==='c'||k==='C'){cDown=true;tryReset();}
});
document.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k==='a'){aDown=false;cancelReset();}
  if(k==='c'){cDown=false;cancelReset();}
});

// ── 啟動 ─────────────────────────────────────────────
if(loadPet()){
  FAST_MODE=pet?.fastMode||false;
  document.getElementById('btn-fast').classList.toggle('active',FAST_MODE);
  applyOffline();
  if(pet) pet.lastTs=Date.now();
}else{
  pet=null;
}
renderIcons();
render();
if(pet) renderHUD();

setInterval(tick,TICK_MS);

window.addEventListener('beforeunload',()=>{
  if(pet){pet.lastTs=Date.now();save();}
});

try{localStorage.setItem('lastPlayed','Tamagotchi.html');}catch(e){}
</script>
