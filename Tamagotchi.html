function drawSprite(key, dx, dy, scale){
  scale = scale||S;
  const rows=SP[key];
  if(!rows)return;
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      const v=parseInt(row[c]);
      if(!v||!PAL[v])continue;
      ctx.fillStyle=PAL[v];
      ctx.fillRect(dx+c*scale,dy+r*scale,scale,scale);
    }
  }
}

const SC_PX=[0,7,10,14,18];
function drawText(str,px,py,sc,col){
  sc=sc||1;col=col||'#1a1a1a';
  const sz=SC_PX[sc]||sc*6;
  ctx.save();
  ctx.font=sz+'px "Press Start 2P",monospace';
  ctx.fillStyle=col;
  ctx.textBaseline='top';
  ctx.fillText(str,px,py);
  ctx.restore();
}
function textW(str,sc){
  sc=sc||1;
  const sz=SC_PX[sc]||sc*6;
  ctx.save();
  ctx.font=sz+'px "Press Start 2P",monospace';
  const w=ctx.measureText(str).width;
  ctx.restore();
  return w;
}
// чНЎфИ­шМхЉ
function drawTextC(str,cy,sc,col){
  const w=textW(str,sc);
  drawText(str,Math.floor((W-w)/2),cy,sc,col);
}

// ?яПН?яПН ?яПНщЗ?яПНхМяПН?ageDaysяМяПН??яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
const STAGE_DAYS={baby:0,child:1,teen:3,adult:6,senior:10};
const NEXT_STAGE={egg:'baby',baby:'child',child:'teen',teen:'adult',adult:'senior'};

// ?яПН?яПН хЄяПН??яПНцЗ ?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
const isSleepTime=()=>{const h=new Date().getHours();return h>=SLEEP_START||h<SLEEP_END;};

// ?яПН?яПН ?яПНяПН?шЃяПН? ?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
function applyOffline(){
  return; // DISABLED FOR TESTING
  if(!pet||pet.dead||pet.stage==='egg')return;
  const now=Date.now();
  const raw=now-(pet.lastTs||now);
  if(raw<=0){pet.lastTs=now;return;}
  // шЖяПН? grace ?яПНяПН?яПН?
  const eff=Math.max(0,raw-OFFLINE_GRACE);
  if(eff<=0){pet.lastTs=now;return;}
  const gm=(eff/1000/60)*(FAST_MODE?60:1)*0.6;
  pet.ageMin+=gm;
  pet.hungerAcc+=gm;
  const hT=Math.floor(pet.hungerAcc/HUNGER_DECAY);
  pet.hungerAcc%=HUNGER_DECAY;
  pet.hunger=Math.min(4,pet.hunger+hT);
  pet.happyAcc+=gm;
  const aT=Math.floor(pet.happyAcc/HAPPY_DECAY);
  pet.happyAcc%=HAPPY_DECAY;
  pet.happy=Math.max(0,pet.happy-aT);
  recalcAttn();
  pet.lastTs=now;
}

// ?яПН?яПН яПН?Tick ?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
function tick(){
  animF++;
  blinkT++;
  if(blinkT>=14){blinkOn=!blinkOn;blinkT=0;}

  if(!pet){render();return;}
  if(pet.dead){animF%2===0&&save();render();return;}

  // ??
  if(pet.stage==='egg'){
    pet.ageMin+=mpt();
    if(pet.ageMin>=60*24) hatch();
    else{save();render();}
    return;
  }

  const sleeping=isSleepTime();
  pet.sleeping=sleeping;

  if(!sleeping){
    const m=mpt();
    pet.ageMin+=m;

    // щЃЂяПН?
    pet.hungerAcc+=m;
    if(pet.hungerAcc>=HUNGER_DECAY){
      pet.hungerAcc-=HUNGER_DECAY;
      if(pet.hunger<4){pet.hunger++;}
      if(pet.hunger>=4){pet.callAttn=true;pet.careMiss++;}
    }

    // хПЋяПН?
    pet.happyAcc+=m;
    if(pet.happyAcc>=HAPPY_DECAY){
      pet.happyAcc-=HAPPY_DECAY;
      if(pet.happy>0){pet.happy--;}
      if(pet.happy<=0){pet.callAttn=true;pet.careMiss++;}
    }

    // фОПфОПцЕяПН?
    pet.poopAcc+=m;
    if(!pet.poopWarn&&pet.poopAcc>=POOP_INTERVAL&&pet.poop<3){
      pet.poopAcc=0;
      pet.poopWarn=true;
      pet.poopWarnAge=0;
      pet.callAttn=true;
      sfx('alert');
    }
    if(pet.poopWarn){
      pet.poopWarnAge+=m;
      if(pet.poopWarnAge>=POOP_WARN_TTL){
        // ?яПНяПН??яПНяПН?
        pet.poopWarn=false;
        pet.poopWarnAge=0;
        pet.poop=Math.min(pet.poop+1,3);
        // ?яПНфОПфОПхАБ?яПНяПН??яПНяПН???
        if(pet.poop>=2&&!pet.sick){
          pet.sick=true;
          pet.sickPresses=1+Math.floor(Math.random()*2);
        }
        recalcAttn();
      }
    }

    // ?яПНяПН?шЈяПН?
    if(pet.sick){
      pet.sickAcc+=m;
      if(pet.sickAcc>=240){die(false);return;}
    }else{
      pet.sickAcc=0;
    }

    // щЋяПН??яПНяПН??яПНяПН?
    if(pet.weight>12&&!pet.sick&&Math.random()<0.003){
      pet.sick=true;
      pet.sickPresses=1+Math.floor(Math.random()*2);
      recalcAttn();
    }

    // ?яПНхМ?яПНяПН?чДхОяПН??яПНяПН?
    pet.fakeAcc+=m;
    if(!pet.fakeAttn&&!pet.callAttn&&pet.fakeAcc>180+Math.random()*120){
      pet.fakeAcc=0;
      pet.fakeAttn=true;
      pet.callAttn=true;
      sfx('alert');
    }

    // ?яПНщЗ
    checkGrowth();
  }

  save();
  render();
  renderHUD();
}

function hatch(){
  pet.stage='baby';
  pet.ageMin=0;
  pet.hunger=1;pet.happy=3;
  sfx('hatch');save();
}

function checkGrowth(){
  const ageDays=pet.ageMin/(60*24);
  const next=NEXT_STAGE[pet.stage];
  if(!next)return;
  const need=STAGE_DAYS[next];
  if(need===undefined)return;
  if(ageDays>=need){
    // Senior ?яПНяПН?фИхЎхЃН?????яПНчЖц­ЛяПН?хЄЉфНПяПН?
    if(pet.stage==='senior'&&ageDays>=STAGE_DAYS.senior+5){
      die(true);return;
    }
    if(pet.stage!=='senior'){
      const good=pet.careMiss<=CARE_MISS_MAX;
      pet.variant=good?'good':'bad';
      pet.stage=next;
      pet.careMiss=0;
      sfx('evolve');
    }
  }
}

function die(natural){
  pet.dead=true;
  pet.angel=natural;
  sfx('dead');
  save();
  render();
}

function recalcAttn(){
  pet.callAttn=(pet.hunger>=4||pet.happy<=0||pet.sick||pet.poop>0||pet.poopWarn||pet.fakeAttn);
}

function actFeed(snack){

  else{if(pet.hunger>0){pet.hunger--;pet.weight+=1;}}

}
function actToilet(){

function actDiscipline(){
  if(!pet||pet.dead)return;
  if(pet.fakeAttn){
    // яПН?яПНяПН?яПНяПН?яМяПН??яПНяПН?яПН?
    pet.fakeAttn=false;
    pet.callAttn=false;
    if(pet.discipline<4)pet.discipline++;

  }else if(pet.callAttn&&(pet.hunger>=4||pet.happy<=0)){
    // ?яПНяПН?цБяПН??яПНчНА ??careMiss
    pet.careMiss++;

}

// ?яПН?яПН ?яПНцГ ?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
function startPlay(){
  if(!pet||pet.dead||pet.sleeping||pet.sick)return;
  playState={phase:'choose',pChoice:0,cChoice:0,result:null};
  subIdx=0;menuOpen=false;
  render();
}
function resolvePlay(){
  const p=playState.pChoice;
  const c=Math.floor(Math.random()*3);
  playState.cChoice=c;
  // 0=Paper 1=Rock 2=ScissorsяМPaper>Rock, Rock>Scissors, Scissors>Paper
  let res='draw';
  if((p===0&&c===1)||(p===1&&c===2)||(p===2&&c===0))res='win';
  else if(p!==c)res='lose';
  playState.result=res;
  playState.phase='result';
  if(res==='win'&&pet.happy<4){pet.happy++;sfx('win');}
  else sfx(res==='lose'?'lose':'click');
  recalcAttn();save();
}

// ?яПН?яПН ?яПНщЂцИВяПН? ?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
function sprKey(){
  if(!pet)return'egg';
  if(pet.dead)return pet.angel?'angel':'skull';
  if(pet.stage==='egg')return'egg';
  if(pet.stage==='baby')return'baby';
  return pet.stage+'_'+(pet.variant||'good');
}

function bg(dark){

function drawLCDGrid(){
  const CELL=4; // цЏц М 4px
  ctx.save();
  ctx.strokeStyle='rgba(180,80,130,0.09)';
  ctx.lineWidth=0.5;
  for(let x=0;x<=W;x+=CELL){
    ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();
  }
  for(let y=0;y<=H;y+=CELL){
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();
  }
  ctx.restore();
}

function render(){
  if(shopPhase){drawShop();drawLCDGrid();return;}

  if(pet.stage==='egg'){drawEgg();drawLCDGrid();return;}
  if(pet.sleeping){drawSleep();drawLCDGrid();return;}
  if(playState){drawPlay();drawLCDGrid();return;}

// ?яПН?яПН ??canvas arc ?яПНяПН?цЛяПН?яПН??яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
function drawEggShape(cx,cy,rw,rh,typeIdx){
  const t=EGG_TYPES[typeIdx||0];
  ctx.save();
  // ?яПНхНБ
  ctx.beginPath();
  ctx.ellipse(cx,cy+rh+4,rw*0.7,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.13)';ctx.fill();
  // ?яПНхНЂ 4 цЎЕяПН??яПНяПН?фИяПН?цНЄуфИ­хЏЌуяПН???
  const top=cy-rh, bot=cy+rh;
  ctx.beginPath();
  ctx.moveTo(cx, top);
  // ?яПНяПН?яМяПН?щЛяПН??яПНяПН??яПНяПН??яПНхЖщЛяПН??яПНяПН??яПНщЈ?яПНяПН?
  ctx.bezierCurveTo(cx+rw*0.75, top,         cx+rw,      cy-rh*0.1,   cx+rw,      cy+rh*0.2);
  // ?яПНяПН?яМяПН?хЏЌяПН??яПНяПН??яПНцЖ
  ctx.bezierCurveTo(cx+rw,      cy+rh*0.65,  cx+rw*0.55, bot,         cx,         bot);
  // хЗІяПН?яМяПН?хКхЗІ??
  ctx.bezierCurveTo(cx-rw*0.55, bot,         cx-rw,      cy+rh*0.65,  cx-rw,      cy+rh*0.2);
  // хЗІяПН?яМцЖчЊяПН??яПНяПН?яМцЇ?яПНяПН?хЄцЈшЎяПН??яПНяПН?яПН?
  ctx.bezierCurveTo(cx-rw,      cy-rh*0.1,   cx-rw*0.75, top,         cx,         top);
  ctx.closePath();
  ctx.fillStyle=t.fill;ctx.fill();
  ctx.strokeStyle=t.stroke;ctx.lineWidth=3;ctx.stroke();
  // шЃщЃО
  if(t.deco==='spots'){
    ctx.fillStyle=t.stroke;
    [[cx-rw*.25,cy-rh*.1,4],[cx+rw*.2,cy+rh*.15,5],[cx-rw*.05,cy+rh*.35,3]]
      .forEach(([x,y,r])=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();});
  }else if(t.deco==='stars'){
    ctx.fillStyle=t.stroke;
    [[cx+rw*.2,cy-rh*.2],[cx-rw*.25,cy+rh*.1],[cx+rw*.05,cy+rh*.35]]
      .forEach(([x,y])=>{
        ctx.beginPath();
        ctx.moveTo(x,y-5);ctx.lineTo(x+3,y);ctx.lineTo(x,y+5);ctx.lineTo(x-3,y);
        ctx.closePath();ctx.fill();
      });
  }
  // ?яПНцОЄ
  ctx.beginPath();
  ctx.ellipse(cx-rw*.22,cy-rh*.3,rw*.15,rh*.11,-0.4,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.55)';ctx.fill();
  ctx.restore();
}

function renderHUD(){
  if(!pet)return;
  ['hunger','happy'].forEach(key=>{
    const el=document.getElementById(key+'-hearts');
    if(!el)return;
    el.innerHTML='';
    for(let i=0;i<4;i++){

// ?яПН?яПН ?яПНяПН? ?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
let AC=null, muted=false;
function getAC(){if(!AC)try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}return AC;}
function beep(freq,dur,v,type){
  if(muted)return;
  try{
    const ac=getAC();if(!ac)return;
    if(ac.state==='suspended')ac.resume();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type||'square';o.frequency.value=freq;
    g.gain.setValueAtTime(v||0.1,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g);g.connect(ac.destination);
    o.start();o.stop(ac.currentTime+dur+0.02);
  }catch(e){}
}
function sfx(t){
  if(muted)return;
  const seq=(arr,d)=>arr.forEach(([f,delay])=>setTimeout(()=>beep(f,d),delay));
  switch(t){
    case 'eat':    beep(880,0.07);break;
    case 'hatch':  seq([[523,0],[659,100],[784,200],[1047,300]],0.12);break;
    case 'evolve': seq([[523,0],[659,90],[784,180],[1047,270],[1319,360]],0.13);break;
    case 'dead':   seq([[440,0],[330,160],[220,320],[147,480]],0.28,'sawtooth');break;
    case 'meds':   beep(660,0.08);setTimeout(()=>beep(880,0.1),110);break;
    case 'clean':  beep(440,0.06);setTimeout(()=>beep(660,0.06),90);break;
    case 'scold':  beep(200,0.15,'sawtooth');break;
    case 'click':  beep(600,0.04);break;
    case 'win':    seq([[784,0],[1047,70],[1319,140]],0.1);break;
    case 'lose':   beep(294,0.2,'sawtooth');break;
    case 'alert':  [0,150].forEach(d=>setTimeout(()=>beep(880,0.06),d));break;
  }
}

// ?яПН?яПН ?яПНяПН??яПНшМЏ ?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН?яПН
function pressA(){
  getAC();
  if(shopPhase){shopIdx=(shopIdx+EGG_TYPES.length-1)%EGG_TYPES.length;sfx('click');render();return;}
  if(!pet||pet.dead)return;
  if(playState&&playState.phase==='choose'){subIdx=(subIdx+3-1)%3;sfx('click');render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food'){subIdx=(subIdx+1)%2;sfx('click');}
    render();return;
  }
  menuIdx=(menuIdx+MENUS.length-1)%MENUS.length;
  renderIcons();render();
}
function pressB(){
  getAC();
  if(!pet&&!shopPhase){shopPhase=true;shopIdx=0;sfx('click');render();return;}
  if(shopPhase){
    const p=newPet();p.eggType=shopIdx;pet=p;
    shopPhase=false;eggShake={active:false,frames:0,next:120};save();sfx('hatch');render();return;
  }
  if(pet.dead){shopPhase=true;shopIdx=0;pet=null;render();return;}
  if(playState){
    if(playState.phase==='choose'){playState.pChoice=subIdx;resolvePlay();render();}
    else{playState=null;render();}
    return;
  }
  if(showStat){showStat=false;render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food')actFeed(subIdx===1);
    menuOpen=false;render();renderHUD();return;
  }
  const m=MENUS[menuIdx];
  if(m==='status'){showStat=true;render();return;}
  if(m==='play'){startPlay();return;}
  if(m==='food'){menuOpen=true;subIdx=0;sfx('click');render();return;}
  if(m==='light'){sfx('click');render();return;}
  if(m==='meds'){actMeds();return;}
  if(m==='toilet'){actToilet();return;}
  if(m==='discipline'){actDiscipline();return;}
  render();renderHUD();
}
function pressC(){
  getAC();
  if(shopPhase){shopIdx=(shopIdx+1)%EGG_TYPES.length;sfx('click');render();return;}
  if(!pet||pet.dead)return;
  if(playState&&playState.phase==='choose'){subIdx=(subIdx+1)%3;sfx('click');render();return;}
  if(playState&&playState.phase==='result'){playState=null;render();return;}
  if(menuOpen){
    const m=MENUS[menuIdx];
    if(m==='food'){subIdx=(subIdx+1)%2;sfx('click');render();}
    else{menuOpen=false;render();}
    return;
  }
  if(showStat){showStat=false;render();return;}
  menuIdx=(menuIdx+1)%MENUS.length;
  renderIcons();render();
}

let aDown=false,cDown=false,resetTimer=null;
function tryReset(){
  if(aDown&&cDown){
    resetTimer=setTimeout(()=>{
      if(aDown&&cDown){
        localStorage.removeItem(SAVE);
        pet=null;shopPhase=false;aDown=false;cDown=false;
        render();
        const el=document.getElementById('hunger-hearts');
        if(el) el.innerHTML='';
        const el2=document.getElementById('happy-hearts');
        if(el2) el2.innerHTML='';
      }
    },1000);
  }
}
function cancelReset(){clearTimeout(resetTimer);}

document.getElementById('btn-a').addEventListener('mousedown',()=>{aDown=true;tryReset();});
document.getElementById('btn-a').addEventListener('mouseup',()=>{aDown=false;cancelReset();});
document.getElementById('btn-c').addEventListener('mousedown',()=>{cDown=true;tryReset();});
document.getElementById('btn-c').addEventListener('mouseup',()=>{cDown=false;cancelReset();});
document.getElementById('btn-a').addEventListener('click',pressA);
document.getElementById('btn-b').addEventListener('click',pressB);
document.getElementById('btn-c').addEventListener('click',pressC);

// touch
['a','b','c'].forEach(id=>{
  const el=document.getElementById('btn-'+id);
  el.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(id==='a'){aDown=true;tryReset();pressA();}
    if(id==='b') pressB();
    if(id==='c'){cDown=true;tryReset();pressC();}
  },{passive:false});
  el.addEventListener('touchend',()=>{
    if(id==='a'){aDown=false;cancelReset();}
    if(id==='c'){cDown=false;cancelReset();}
  });
});

document.addEventListener('keydown',e=>{
