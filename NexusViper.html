<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
  <title>NEXUS VIPER</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;background:#000;overflow:hidden;}
    #wrap{
      position:fixed;left:50%;top:50%;
      transform-origin:center center;
      display:flex;flex-direction:column;align-items:center;
    }
    #frame{
      position:relative;
      background:#000;
      border:2px solid #333;
      box-shadow:
        0 0 0 1px #000,
        0 0 18px #0f88,
        0 0 40px #0f84,
        0 0 80px #0f82,
        inset 0 0 12px #0f81;
      display:flex;flex-direction:column;
    }
    canvas{display:block;image-rendering:pixelated;cursor:none;}
    /* Overlay */
    #overlay{
      position:absolute;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:8px;
      background:rgba(0,0,0,.85);font-family:'Press Start 2P',monospace;color:#fff;
      padding:12px 16px;
      z-index:10;
    }
    #overlay.hidden{display:none}
    #overlay-title{font-size:13px;color:#0f0;text-shadow:0 0 12px #0f0,0 0 30px #0f0;letter-spacing:3px;text-align:center;margin-bottom:4px;}
    #overlay-sub{font-size:7px;color:#6af;text-align:center;line-height:1.8;max-width:300px}
    #overlay-score{font-size:9px;color:#ff0;text-align:center}
    .hint{font-size:6px;color:#444;text-align:center;line-height:1.8}
    .desktop-hint{}
    .mobile-hint{display:none}
    @media(pointer:coarse){.desktop-hint{display:none}.mobile-hint{display:block}}
    #overlay-btn{
      margin-top:8px;font-family:'Press Start 2P',monospace;font-size:10px;
      background:#0f0;color:#000;border:none;padding:10px 24px;cursor:pointer;
      letter-spacing:2px;
    }
    #overlay-btn:hover{background:#0c0}
    /* Mobile controls */
    #ctrl{
      width:100%;
      display:none;align-items:center;justify-content:space-between;
      padding:8px 8px 0;
      gap:6px;
    }
    @media(pointer:coarse){#ctrl{display:flex}}
    .ctrl-left{display:flex;gap:6px;pointer-events:auto}
    .ctrl-right{display:flex;gap:6px;pointer-events:auto}
    .cbtn{
      font-family:'Press Start 2P',monospace;font-size:9px;
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
      color:#fff;padding:0;width:50px;height:50px;
      border-radius:6px;cursor:pointer;user-select:none;-webkit-user-select:none;
      display:flex;align-items:center;justify-content:center;
    }
    .cbtn:active{background:rgba(255,255,255,.28)}
    #btn-select{font-size:7px}
  </style>
</head>
<body>
<div id="wrap">
  <div id="frame">
  <canvas id="cv"></canvas>

  <!-- overlay -->
  <div id="overlay">
    <div id="overlay-title">NEXUS VIPER</div>
    <div id="overlay-score"></div>
    <div id="overlay-weapons" style="font-family:'Press Start 2P',monospace;font-size:6px;color:#0af;text-align:center;line-height:2.2;border:1px solid #0af4;padding:6px 12px;">
      POWER-UP SYSTEM<br>
      <span style="color:#ff0">CAPSULE</span> → SELECT:<br>
      SPEED · MISSILE · DOUBLE · LASER · OPTION · SHIELD
    </div>
    <div class="hint desktop-hint">← → ↑ ↓ 移動 &nbsp;|&nbsp; Z/SPACE 射擊 &nbsp;|&nbsp; X 選升級<br>P 暫停 &nbsp;|&nbsp; ESC 返回</div>
    <div class="hint mobile-hint">方向控制移動 &nbsp;|&nbsp; FIRE 射擊<br>SEL 選擇升級 &nbsp;|&nbsp; 點畫面暫停</div>
    <button id="overlay-btn">▶ START</button>
  </div>

  </div><!-- /frame -->
  <!-- mobile controls -->
  <div id="ctrl">
    <div class="ctrl-left">
      <button class="cbtn" id="btn-up">▲</button>
      <div style="display:flex;flex-direction:column;gap:6px;pointer-events:auto">
        <button class="cbtn" id="btn-left">◀</button>
        <button class="cbtn" id="btn-right">▶</button>
      </div>
      <button class="cbtn" id="btn-down">▼</button>
    </div>
    <div class="ctrl-right">
      <button class="cbtn" id="btn-select">SEL</button>
      <button class="cbtn" id="btn-fire">FIRE</button>
    </div>
  </div>
</div>

<script>
'use strict';
// ── Canvas setup ──────────────────────────────────────────
const CW=320, CH=224;
const DPR=window.devicePixelRatio||1;
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
cv.width=CW*DPR; cv.height=CH*DPR;
cv.style.width=CW+'px'; cv.style.height=CH+'px';
ctx.scale(DPR,DPR);

// Scale wrap to fit screen
function resize(){
  const isTouchDevice=window.matchMedia('(pointer:coarse)').matches;
  const CTRL_H=isTouchDevice?74:0;
  const TOTAL_H=CH+CTRL_H;
  const scaleX=window.innerWidth/CW;
  const scaleY=window.innerHeight/TOTAL_H;
  const s=Math.min(scaleX,scaleY,1.8);
  document.getElementById('wrap').style.transform=`translate(-50%,-50%) scale(${s.toFixed(4)})`;
}
window.addEventListener('resize',resize); resize();

// ── Audio ──────────────────────────────────────────────────
let AC=null;
function getAC(){if(!AC){AC=new(window.AudioContext||window.webkitAudioContext)();} return AC;}
function mkComp(ac){
  const c=ac.createDynamicsCompressor();
  c.threshold.value=-12; c.knee.value=6; c.ratio.value=4;
  c.attack.value=0.003; c.release.value=0.15;
  c.connect(ac.destination); return c;
}
let masterBus=null;
function getMaster(){
  const ac=getAC();
  if(!masterBus){masterBus=mkComp(ac);}
  return masterBus;
}
function beep(freq,dur,vol=0.15,type='square',detune=0){
  try{
    const ac=getAC(), g=ac.createGain(), o=ac.createOscillator();
    o.type=type; o.frequency.value=freq; o.detune.value=detune;
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.connect(g); g.connect(getMaster());
    o.start(); o.stop(ac.currentTime+dur);
  }catch(e){}
}
function sndShoot(){beep(880,0.07,0.06,'square')}
function sndExplosion(){
  try{
    const ac=getAC(),buf=ac.createBuffer(1,ac.sampleRate*0.25,ac.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
    const s=ac.createBufferSource(),g=ac.createGain();
    g.gain.setValueAtTime(0.35,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.25);
    s.buffer=buf; s.connect(g); g.connect(getMaster()); s.start();
  }catch(e){}
}
function sndPowerup(){
  [440,550,660,880].forEach((f,i)=>setTimeout(()=>beep(f,0.1,0.12,'square'),i*60));
}
function sndHit(){beep(220,0.08,0.1,'sawtooth')}
function sndSelect(){beep(660,0.06,0.1,'square')}
function sndExtraLife(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.15,0.12,'square'),i*80))}
function sndLaser(){beep(1200,0.12,0.07,'sawtooth',-200)}
function sndMissile(){beep(330,0.1,0.08,'sawtooth')}
function sndBossHit(){beep(150,0.1,0.2,'sawtooth')}

// BGM
let bgmNodes=[], bgmRunning=false;
const BGM_TEMPO=120; // BPM
const BGM_BEAT=60/BGM_TEMPO;
// Simple looping bass line + melody
const BASS=[
  [110,1],[110,0.5],[138,0.5],[110,1],[110,0.5],[123,0.5],
  [98,1],[98,0.5],[110,0.5],[98,1],[87,1]
];
const MELODY=[
  [440,0.5],[494,0.5],[523,1],[440,0.5],[392,0.5],[440,1],
  [440,0.5],[494,0.5],[523,0.5],[587,0.5],[523,1],[494,0.5],[440,0.5],
  [392,1],[349,0.5],[392,0.5],[440,2]
];
function playBGM(){
  if(bgmRunning)return;
  bgmRunning=true;
  try{
    const ac=getAC(), bus=getMaster();
    function scheduleLoop(){
      if(!bgmRunning)return;
      let t=ac.currentTime+0.05;
      // Bass
      BASS.forEach(([f,dur])=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='square'; o.frequency.value=f;
        g.gain.setValueAtTime(0.04,t); g.gain.setValueAtTime(0.001,t+dur*BGM_BEAT*0.9);
        o.connect(g); g.connect(bus); o.start(t); o.stop(t+dur*BGM_BEAT);
        bgmNodes.push(o);
        t+=dur*BGM_BEAT;
      });
      const loopDur=BASS.reduce((a,[,d])=>a+d,0)*BGM_BEAT;
      // Melody (offset slightly)
      let mt=ac.currentTime+0.05;
      MELODY.forEach(([f,dur])=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.type='square'; o.frequency.value=f;
        g.gain.setValueAtTime(0.035,mt); g.gain.setValueAtTime(0.001,mt+dur*BGM_BEAT*0.85);
        o.connect(g); g.connect(bus); o.start(mt); o.stop(mt+dur*BGM_BEAT);
        bgmNodes.push(o);
        mt+=dur*BGM_BEAT;
      });
      const melodyDur=MELODY.reduce((a,[,d])=>a+d,0)*BGM_BEAT;
      const nextLoop=Math.max(loopDur,melodyDur);
      bgmNodes.push(setTimeout(scheduleLoop, nextLoop*1000-100));
    }
    scheduleLoop();
  }catch(e){}
}
function stopBGM(){
  bgmRunning=false;
  bgmNodes.forEach(n=>{try{if(n&&n.stop)n.stop();if(typeof n==='number')clearTimeout(n);}catch(e){}});
  bgmNodes=[];
}

// ── Input ──────────────────────────────────────────────────
const keys={};
window.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault();
  if(e.code==='Escape') onEsc();
  if(e.code==='KeyP') onPause();
  if((e.code==='Space'||e.code==='Enter') && overlayVisible()) startGame();
  if(e.code==='KeyX'||e.code==='KeyS') trySelect();
});
window.addEventListener('keyup',e=>{keys[e.code]=false;});

// Mobile buttons
const mobileState={up:false,down:false,left:false,right:false,fire:false};
function bindBtn(id,key){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();mobileState[key]=true;if(id==='btn-fire')fireHeld=true;},{ passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();mobileState[key]=false;if(id==='btn-fire')fireHeld=false;},{ passive:false});
  el.addEventListener('mousedown',e=>{mobileState[key]=true;if(id==='btn-fire')fireHeld=true;});
  el.addEventListener('mouseup',e=>{mobileState[key]=false;if(id==='btn-fire')fireHeld=false;});
}
bindBtn('btn-up','up'); bindBtn('btn-down','down');
bindBtn('btn-left','left'); bindBtn('btn-right','right');
bindBtn('btn-fire','fire');
document.getElementById('btn-select')?.addEventListener('click',()=>trySelect());

// Canvas tap = pause
cv.addEventListener('click',()=>{if(gameRunning&&!overlayVisible())onPause();});

let fireHeld=false;

function isUp(){return keys['ArrowUp']||keys['KeyW']||mobileState.up}
function isDown(){return keys['ArrowDown']||keys['KeyS']||mobileState.down}
function isLeft(){return keys['ArrowLeft']||keys['KeyA']||mobileState.left}
function isRight(){return keys['ArrowRight']||keys['KeyD']||mobileState.right}
function isFire(){return keys['Space']||keys['KeyZ']||keys['Enter']||fireHeld||mobileState.fire}
function trySelect(){if(gameRunning&&!paused){selectPowerup();}}

// ── Overlay ────────────────────────────────────────────────
const overlay=document.getElementById('overlay');
const overlayScore=document.getElementById('overlay-score');
document.getElementById('overlay-btn').addEventListener('click',startGame);
function overlayVisible(){return !overlay.classList.contains('hidden')}
function showOverlay(msg=''){
  overlay.classList.remove('hidden');
  overlayScore.textContent=msg;
}
function hideOverlay(){overlay.classList.add('hidden')}
function onEsc(){if(gameRunning){stopGame();showOverlay('');}}
function onPause(){
  if(!gameRunning||overlayVisible())return;
  paused=!paused;
  if(paused)stopBGM(); else playBGM();
}

// ── HUD boundaries ───────────────────────────────────────────
const HUD_TOP=18;      // top score bar height
const HUD_BOT=22;      // bottom power-up bar height
const PLAY_TOP=HUD_TOP;
const PLAY_BOT=CH-HUD_BOT;

// ── Game state ─────────────────────────────────────────────
let gameRunning=false, paused=false;
let score=0, hiScore=0, lives=3, stage=1;
let gameOver=false;

// Player
let px=40, py=CH/2-8;
const PSPEED_BASE=1.8;
let pSpeed=PSPEED_BASE;
let pW=24, pH=12;
let invincible=0; // frames of invincibility after hit
let shieldActive=false;

// Weapons
let hasDouble=false, hasLaser=false, hasMissile=false, optionCount=0;
let laserActive=false, laserTimer=0;

// Options (drones) — ring buffer for trail
let optionTrail=new Array(300).fill(null).map(()=>({x:0,y:0}));
let optionTrailHead=0;
const MAX_TRAIL=300;
const OPTION_DIST=50; // pixels behind player per option

// Power-up bar
// Slots: SPEED, SPEED, MISSILE, DOUBLE, LASER, OPTION, SHIELD
const POWERUP_SLOTS=['SPEED','SPEED','MISSILE','DOUBLE','LASER','OPTION','SHIELD'];
let powerCursor=0; // current highlighted slot (0-6)
let capsules=[]; // collectible capsules on screen

// Bullets
let playerBullets=[], enemyBullets=[];
let fireCooldown=0;
const FIRE_RATE=10; // frames between shots
let laserBeam=null; // {x,y,len,timer}

// Missiles
let missiles=[];
let missileCooldown=0;
const MISSILE_RATE=40;

// Enemies
let enemies=[];
let explosions=[];
let particles=[];

// Scrolling
let bgScroll=0, terrainScroll=0;
let stars=[];

// Stage / wave
let waveTimer=0, waveIndex=0, stagePhase=0;
// stagePhase: 0=space, 1=asteroid, 2=boss_approach, 3=boss
let bossRef=null;
let stageClear=false, stageClearTimer=0;

// Score
let scorePopups=[];

// ── Initialize ────────────────────────────────────────────
function initStars(){
  stars=[];
  for(let i=0;i<80;i++){
    stars.push({
      x:Math.random()*CW, y:Math.random()*CH,
      spd:0.3+Math.random()*1.5,
      r:Math.random()<0.3?1.5:1,
      bright:Math.floor(80+Math.random()*176)
    });
  }
}

function initGame(){
  px=40; py=CH/2-8;
  pSpeed=PSPEED_BASE;
  invincible=0; shieldActive=false;
  hasDouble=false; hasLaser=false; hasMissile=false; optionCount=0;
  optionTrailHead=0;
  optionTrail.forEach(p=>{p.x=px||40;p.y=py||CH/2;});
  laserActive=false; laserTimer=0; laserBeam=null;
  powerCursor=0;
  playerBullets=[]; enemyBullets=[]; missiles=[];
  capsules=[]; enemies=[]; explosions=[]; particles=[]; scorePopups=[];
  fireCooldown=0; missileCooldown=0;
  waveTimer=0; waveIndex=0; stagePhase=0;
  bossRef=null; stageClear=false; stageClearTimer=0;
  bgScroll=0; terrainScroll=0;
  gameOver=false;
  initStars();
}

function startGame(){
  getAC();
  if(overlayScore.textContent.includes('SCORE')) {
    score=0; lives=3; stage=1;
  }
  hideOverlay();
  initGame();
  gameRunning=true; paused=false;
  lastTime=performance.now();
  playBGM();
  requestAnimationFrame(loop);
}

function stopGame(){
  gameRunning=false;
  stopBGM();
}

// ── Wave definitions ──────────────────────────────────────
// Each wave: {delay(frames), spawn:fn}
function makeWaves(s){
  const W=[];
  if(s===1){
    // Phase 0: open space formations
    W.push({delay:120,spawn:()=>spawnFormation('dart',5,'line_h',CW+20,60)});
    W.push({delay:200,spawn:()=>spawnFormation('dart',5,'line_h',CW+20,130)});
    W.push({delay:180,spawn:()=>spawnFormation('fighter',3,'v_line',CW+20,80)});
    W.push({delay:220,spawn:()=>spawnFormation('dart',8,'sine',CW+20,CH/2)});
    W.push({delay:200,spawn:()=>spawnFormation('fighter',4,'diamond',CW+30,CH/2)});
    W.push({delay:240,spawn:()=>spawnFormation('heavy',2,'line_h',CW+20,90)});
    W.push({delay:200,spawn:()=>spawnFormation('dart',6,'sine',CW+20,CH/2)});
    W.push({delay:180,spawn:()=>spawnFormation('fighter',5,'v_line',CW+20,60)});
    // Phase 1: asteroids
    W.push({delay:300,spawn:()=>startAsteroids()});
    W.push({delay:100,spawn:()=>spawnFormation('dart',4,'line_h',CW+20,50)});
    W.push({delay:150,spawn:()=>spawnFormation('heavy',3,'v_line',CW+20,80)});
    W.push({delay:150,spawn:()=>spawnFormation('fighter',6,'sine',CW+20,CH/2)});
    // Phase 2: boss approach
    W.push({delay:300,spawn:()=>enterBossApproach()});
    // Phase 3: boss
    W.push({delay:180,spawn:()=>spawnBoss()});
  }
  return W;
}
let waves=[];

function startAsteroids(){
  stagePhase=1;
  // spawn some asteroids
  for(let i=0;i<6;i++)setTimeout(()=>spawnAsteroid(),i*600);
}
function enterBossApproach(){
  stagePhase=2;
  stopBGM();
  // warning
  scorePopups.push({x:CW/2,y:CH/2,txt:'!! WARNING !!',color:'#f00',life:180,vy:-0.2,big:true});
  setTimeout(()=>playBGM(),2000);
}
function spawnBoss(){
  stagePhase=3;
  const b={
    x:CW+60, y:CH/2-40,
    w:64, h:80,
    hp:80, maxHp:80,
    vx:-0.6, vy:0, vyDir:0.5,
    phase:0,
    shootTimer:0,
    coreHP:20, coreDestroyed:false,
    arrived:false,
    isBoss:true,
  };
  enemies.push(b);
  bossRef=b;
}

// ── Spawn helpers ─────────────────────────────────────────
function spawnFormation(type, count, pattern, sx, sy){
  for(let i=0;i<count;i++){
    let ex=sx, ey=sy;
    if(pattern==='line_h'){ey=sy+(i-(count-1)/2)*24;}
    else if(pattern==='v_line'){ex=sx+i*28;}
    else if(pattern==='sine'){ex=sx+i*32; ey=sy;}
    else if(pattern==='diamond'){
      const ang=(i/count)*Math.PI*2;
      ex=sx+Math.cos(ang)*30; ey=sy+Math.sin(ang)*30;
    }
    setTimeout(()=>spawnEnemy(type,ex,ey,pattern,i),i*80);
  }
}

function spawnEnemy(type,x,y,pattern,idx){
  const e={type,x,y,pattern,idx,
    timer:0,birthX:x,birthY:y,
    vx:-1.2,vy:0,
    shootTimer:Math.floor(Math.random()*60)+60,
    isBoss:false,
  };
  switch(type){
    case 'dart':   e.hp=1; e.score=100; e.w=14; e.h=10; e.vx=-2+Math.random()*-0.5; break;
    case 'fighter':e.hp=2; e.score=200; e.w=18; e.h=12; e.vx=-1.5; break;
    case 'heavy':  e.hp=4; e.score=500; e.w=22; e.h=16; e.vx=-1.0; break;
    case 'asteroid':e.hp=3; e.score=300; e.w=20; e.h=20; e.vx=-1.8-Math.random(); e.vy=(Math.random()-.5)*1.5; e.rot=0; e.rotSpd=(Math.random()-.5)*0.08; break;
  }
  if(pattern==='sine') e.sineAmp=Math.min(35,(PLAY_BOT-PLAY_TOP)/2-14), e.sineFreq=0.03, e.sineOffset=idx*0.5;
  // Clamp initial Y to play area
  e.y=Math.max(PLAY_TOP+e.h, Math.min(PLAY_BOT-e.h, e.y));
  e.birthY=e.y;
  enemies.push(e);
}

function spawnAsteroid(){
  spawnEnemy('asteroid', CW+20, PLAY_TOP+20+Math.random()*(PLAY_BOT-PLAY_TOP-60), 'free', 0);
}

function spawnCapsule(x,y){
  capsules.push({x,y,vy:(Math.random()-.5)*0.5,timer:0});
}

// ── Player bullets ────────────────────────────────────────
function firePlayerWeapon(){
  sndShoot();
  // Main shot
  playerBullets.push({x:px+pW,y:py+pH/2-1,vx:7,vy:0,w:8,h:3,type:'normal'});
  if(hasDouble){
    playerBullets.push({x:px+pW,y:py+pH/2-1,vx:6,vy:-1.5,w:6,h:2,type:'normal'});
  }
  if(hasLaser){
    sndLaser();
    laserActive=true; laserTimer=18;
    laserBeam={x:px+pW,y:py+pH/2,len:CW,timer:18};
  }
  // Options fire
  for(let i=0;i<optionCount;i++){
    const op=getOptionPos(i);
    if(op) playerBullets.push({x:op.x+10,y:op.y+4,vx:7,vy:0,w:6,h:2,type:'option'});
  }
}

function fireMissile(){
  if(!hasMissile||missileCooldown>0)return;
  sndMissile();
  missileCooldown=MISSILE_RATE;
  // Find nearest enemy
  let target=null, minD=9999;
  enemies.forEach(e=>{
    if(e.isBoss&&e.coreDestroyed)return;
    const d=Math.hypot(e.x-px,e.y-py);
    if(d<minD){minD=d;target=e;}
  });
  missiles.push({x:px+pW/2,y:py+pH,vx:2,vy:2.5,target,phase:0,w:4,h:6});
  missiles.push({x:px+pW/2,y:py,vx:2,vy:-2.5,target,phase:0,w:4,h:6});
}

function getOptionPos(i){
  const dist=Math.min((i+1)*OPTION_DIST, MAX_TRAIL-1);
  const idx=(optionTrailHead - dist + MAX_TRAIL*2)%MAX_TRAIL;
  return optionTrail[idx]||null;
}

// ── Power-up system ───────────────────────────────────────
function selectPowerup(){
  sndSelect();
  // Activate current slot
  const slot=POWERUP_SLOTS[powerCursor];
  switch(slot){
    case 'SPEED': pSpeed=Math.min(PSPEED_BASE+2, pSpeed+0.6); break;
    case 'MISSILE': hasMissile=true; break;
    case 'DOUBLE': hasDouble=true; break;
    case 'LASER': hasLaser=true; break;
    case 'OPTION': if(optionCount<2)optionCount++; break;
    case 'SHIELD': shieldActive=true; break;
  }
  sndPowerup();
  scorePopups.push({x:CW/2,y:CH/2-30,txt:'GET '+slot,color:'#0ff',life:90,vy:-0.5,big:false});
  // advance cursor
  powerCursor=Math.min(POWERUP_SLOTS.length-1, powerCursor+1);
}

// ── Update ────────────────────────────────────────────────
let raf=null;
let lastTime=0;
function loop(ts){
  if(!gameRunning){return;}
  raf=requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTime)/16.667, 2.5); // normalize to 60fps; cap at 2.5x
  lastTime=ts;
  if(!paused) update(dt);
  draw();
}

function update(dt=1){
  // Player movement
  const spd=pSpeed*(isFire()&&hasLaser?0.9:1)*dt;
  if(isUp()   && py>PLAY_TOP+2)       py-=spd;
  if(isDown() && py<PLAY_BOT-pH-2)    py+=spd;
  if(isLeft() && px>4)                px-=spd;
  if(isRight()&& px<CW/2-pW)          px+=spd;

  // Option trail (ring buffer — no alloc/shift)
  optionTrailHead=(optionTrailHead+1)%MAX_TRAIL;
  optionTrail[optionTrailHead].x=px;
  optionTrail[optionTrailHead].y=py;

  // Stars scroll
  stars.forEach(s=>{
    s.x-=s.spd*dt;
    if(s.x<0)s.x=CW+2;
  });

  bgScroll=(bgScroll+0.5*dt)%CW;

  // Invincibility
  if(invincible>0)invincible-=dt;

  // Firing
  if(fireCooldown>0)fireCooldown-=dt;
  if(isFire()&&fireCooldown<=0){
    fireCooldown=FIRE_RATE;
    firePlayerWeapon();
  }
  if(missileCooldown>0)missileCooldown-=dt;
  if(isFire()&&hasMissile&&missileCooldown===0) fireMissile();

  // Laser beam
  if(laserTimer>0)laserTimer-=dt;
  else {laserActive=false; laserBeam=null;}

  // Player bullets
  playerBullets=playerBullets.filter(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    return b.x<CW+10&&b.y>-5&&b.y<CH+5;
  });

  // Enemy bullets
  enemyBullets=enemyBullets.filter(b=>{
    b.x+=b.vx*dt; b.y+=b.vy*dt;
    if(b.x<-10||b.y<-10||b.y>CH+10)return false;
    // hit player
    if(!invincible&&!gameOver&&rectsOverlap(b.x,b.y,b.w||4,b.h||4,px+3,py+2,pW-6,pH-4)){
      playerHit();
      return false;
    }
    return true;
  });

  // Missiles
  missiles=missiles.filter(m=>{
    // Home to target
    if(m.target&&!m.target.coreDestroyed){
      const dx=m.target.x+m.target.w/2-m.x;
      const dy=m.target.y+m.target.h/2-m.y;
      const d=Math.hypot(dx,dy)||1;
      m.vx+=(dx/d)*0.3*dt; m.vy+=(dy/d)*0.3*dt;
      const spd2=Math.hypot(m.vx,m.vy);
      if(spd2>4){m.vx=m.vx/spd2*4;m.vy=m.vy/spd2*4;}
    }
    m.x+=m.vx*dt; m.y+=m.vy*dt;
    if(m.x>CW+10||m.x<-10||m.y<-10||m.y>CH+10)return false;
    // hit enemy
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(e.coreDestroyed)continue;
      if(rectsOverlap(m.x,m.y,m.w,m.h,e.x,e.y,e.w,e.h)){
        hitEnemy(e,2,i);
        spawnMiniExp(m.x,m.y);
        return false;
      }
    }
    return true;
  });

  // Capsules
  capsules=capsules.filter(c=>{
    c.x-=0.8; c.timer++;
    c.y+=c.vy;
    if(c.y<20||c.y>CH-20) c.vy*=-1;
    if(c.x<-20)return false;
    // collect
    if(rectsOverlap(c.x,c.y,12,12,px,py,pW,pH)){
      powerCursor=Math.min(POWERUP_SLOTS.length-1, powerCursor+1);
      sndPowerup();
      scorePopups.push({x:c.x,y:c.y,txt:'CAPSULE',color:'#ff0',life:60,vy:-0.8,big:false});
      addScore(50,c.x,c.y);
      return false;
    }
    return true;
  });

  // Enemies
  enemies=enemies.filter(e=>{
    if(e.isBoss) return updateBoss(e);
    e.timer++;
    if(e.pattern==='sine'){
      e.y=e.birthY+Math.sin(e.timer*e.sineFreq+e.sineOffset)*e.sineAmp;
    } else if(e.type==='asteroid'){
      e.rot+=e.rotSpd;
    }
    e.x+=e.vx*dt; e.y+=e.vy*dt;
    // Clamp to playfield (no entering HUD zones)
    if(e.y<PLAY_TOP){ e.y=PLAY_TOP; if(e.vy<0)e.vy*=-1; }
    if(e.y+e.h>PLAY_BOT){ e.y=PLAY_BOT-e.h; if(e.vy>0)e.vy*=-1; }
    if(e.x<-30)return false;

    // Enemy shoot
    if(e.type!=='asteroid'){
      e.shootTimer--;
      if(e.shootTimer<=0){
        e.shootTimer=60+Math.floor(Math.random()*60);
        const dx=px-e.x, dy=py-e.y, d=Math.hypot(dx,dy)||1;
        const spd2=2.5;
        enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:dx/d*spd2,vy:dy/d*spd2,w:4,h:4});
      }
    }

    // Laser hit
    if(laserBeam&&e.y<py+pH/2+4&&e.y+e.h>py+pH/2-4&&e.x>px){
      hitEnemy(e,0.5);
    }

    // Bullet collision
    for(let i=playerBullets.length-1;i>=0;i--){
      const b=playerBullets[i];
      if(rectsOverlap(b.x,b.y,b.w,b.h,e.x,e.y,e.w,e.h)){
        playerBullets.splice(i,1);
        hitEnemy(e,1);
        break;
      }
    }

    // Player collision
    if(!invincible&&!gameOver&&rectsOverlap(px+3,py+2,pW-6,pH-4,e.x,e.y,e.w,e.h)){
      if(!shieldActive) playerHit();
      else { shieldActive=false; hitEnemy(e,e.hp); }
    }

    return e.hp>0;
  });

  // Explosions
  explosions=explosions.filter(e=>{e.timer-=dt;return e.timer>0;});
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.05; p.life--;
    return p.life>0;
  });
  scorePopups=scorePopups.filter(s=>{
    s.y+=s.vy; s.life--;
    return s.life>0;
  });

  // Wave spawning
  if(!bossRef){
    waveTimer+=dt;
    if(waveIndex<waves.length&&waveTimer>=waves[waveIndex].delay){
      waves[waveIndex].spawn();
      waveIndex++;
      waveTimer=0;
    }
  }

  // Stage clear
  if(stageClear){
    stageClearTimer+=dt;
    if(stageClearTimer>180){
      stage++;
      score+=5000+(lives*1000);
      scorePopups.push({x:CW/2,y:CH/2,txt:'STAGE '+stage+' BONUS',color:'#ff0',life:180,vy:-0.3,big:true});
      initGame();
      waves=makeWaves(stage);
      playBGM();
    }
  }
}

function updateBoss(e){
  e.timer=(e.timer||0)+1;

  // Move to position
  if(!e.arrived){
    e.x+=e.vx;
    if(e.x<=CW-e.w-20){e.x=CW-e.w-20; e.arrived=true;}
  } else {
    // Oscillate
    e.y+=e.vy;
    if(e.y<PLAY_TOP||e.y>PLAY_BOT-e.h) e.vy*=-1;
  }

  // Shooting phases
  e.shootTimer=(e.shootTimer||0)+1;
  if(e.arrived){
    const rate=e.phase===0?60:40;
    if(e.shootTimer>rate){
      e.shootTimer=0;
      if(e.phase===0){
        // Spread shot
        for(let a=-2;a<=2;a++){
          const ang=Math.PI+a*0.18;
          enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,w:5,h:5});
        }
      } else {
        // Aimed burst
        const dx=px-e.x,dy=py-e.y,d=Math.hypot(dx,dy)||1;
        for(let i=0;i<3;i++){
          setTimeout(()=>{
            enemyBullets.push({x:e.x,y:e.y+e.h/2,vx:dx/d*3.5,vy:dy/d*3.5,w:5,h:5});
          },i*120);
        }
      }
    }
    // Phase shift at half HP
    if(e.hp<e.maxHp/2&&e.phase===0){e.phase=1; e.vy*=1.5;}
  }

  // Laser hit
  if(laserBeam&&e.y<py+pH/2+4&&e.y+e.h>py+pH/2-4&&e.x>px){
    e.hp-=0.5; sndBossHit();
    if(e.hp<=0){bossDeath(e);return false;}
  }

  // Bullet hits
  for(let i=playerBullets.length-1;i>=0;i--){
    const b=playerBullets[i];
    if(rectsOverlap(b.x,b.y,b.w,b.h,e.x,e.y,e.w,e.h)&&!e.coreDestroyed){
      playerBullets.splice(i,1);
      e.hp--;
      sndBossHit();
      spawnMiniExp(b.x,b.y);
      if(e.hp<=0){bossDeath(e);return false;}
      break;
    }
  }

  // Missile hits
  for(let i=missiles.length-1;i>=0;i--){
    const m=missiles[i];
    if(rectsOverlap(m.x,m.y,m.w,m.h,e.x,e.y,e.w,e.h)){
      missiles.splice(i,1);
      e.hp-=2;
      sndBossHit();
      spawnMiniExp(m.x,m.y);
      if(e.hp<=0){bossDeath(e);return false;}
    }
  }

  // Player collision
  if(!invincible&&!gameOver&&rectsOverlap(px+3,py+2,pW-6,pH-4,e.x,e.y,e.w,e.h)){
    if(!shieldActive) playerHit();
    else shieldActive=false;
  }

  return true;
}

function bossDeath(e){
  addScore(10000,e.x+e.w/2,e.y+e.h/2);
  // Big explosion chain
  for(let i=0;i<20;i++) setTimeout(()=>{
    spawnExplosion(e.x+Math.random()*e.w,e.y+Math.random()*e.h,true);
  },i*80);
  stopBGM();
  sndExplosion();
  bossRef=null;
  stageClear=true;
  scorePopups.push({x:CW/2,y:CH/2-20,txt:'STAGE CLEAR!',color:'#0f0',life:300,vy:-0.1,big:true});
}

function hitEnemy(e,dmg){
  e.hp-=dmg;
  spawnMiniExp(e.x+e.w/2,e.y+e.h/2);
  sndHit();
  if(e.hp<=0&&!e.dying){
    e.dying=true;
    addScore(e.score||100,e.x,e.y);
    spawnExplosion(e.x+e.w/2,e.y+e.h/2,false);
    sndExplosion();
    if(Math.random()<0.3) spawnCapsule(e.x,e.y);
  }
}

function playerHit(){
  if(invincible>0||gameOver)return;
  sndExplosion();
  spawnExplosion(px+pW/2,py+pH/2,true);
  // Reset weapons
  pSpeed=PSPEED_BASE; hasDouble=false; hasLaser=false; hasMissile=false;
  optionCount=0; shieldActive=false; powerCursor=0;
  laserActive=false; laserBeam=null;
  lives--;
  invincible=150;
  if(lives<=0){
    gameOver=true;
    gameRunning=false;
    stopBGM();
    if(score>hiScore)hiScore=score;
    setTimeout(()=>{
      showOverlay(`SCORE ${score}   HI ${hiScore}`);
      document.getElementById('overlay-score').style.color='#ff0';
    },1000);
  }
}

function spawnExplosion(x,y,big){
  explosions.push({x,y,r:big?28:14,timer:big?40:24,big});
  for(let i=0;i<(big?20:8);i++){
    const ang=Math.random()*Math.PI*2, spd=0.5+Math.random()*3;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-1,
      life:20+Math.floor(Math.random()*30),
      color:['#ff0','#f80','#f44','#fff'][Math.floor(Math.random()*4)]});
  }
}
function spawnMiniExp(x,y){
  explosions.push({x,y,r:6,timer:8,big:false});
}

function addScore(v,x,y){
  score+=v;
  scorePopups.push({x,y,txt:String(v),color:'#ff0',life:50,vy:-1,big:false});
}

function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// ── Draw ──────────────────────────────────────────────────
function draw(){
  ctx.fillStyle='#000810'; ctx.fillRect(0,0,CW,CH);

  drawBG();
  drawTerrain();

  // Options
  for(let i=0;i<optionCount;i++){
    const op=getOptionPos(i);
    if(op) drawOption(op.x,op.y);
  }

  // Player
  drawPlayer();

  // Missile trails
  missiles.forEach(m=>drawMissile(m));

  // Player bullets
  playerBullets.forEach(b=>{
    ctx.fillStyle=b.type==='option'?'#0ff':'#0f0';
    ctx.shadowColor=ctx.fillStyle; ctx.shadowBlur=4;
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.shadowBlur=0;
  });

  // Laser beam
  if(laserActive&&laserBeam){
    const alpha=laserTimer/18;
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.strokeStyle='#0ff';
    ctx.shadowColor='#0ff'; ctx.shadowBlur=12;
    ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(laserBeam.x,laserBeam.y); ctx.lineTo(CW,laserBeam.y); ctx.stroke();
    ctx.lineWidth=1;
    ctx.strokeStyle='#fff';
    ctx.beginPath(); ctx.moveTo(laserBeam.x,laserBeam.y); ctx.lineTo(CW,laserBeam.y); ctx.stroke();
    ctx.restore();
  }

  // Capsules
  capsules.forEach(c=>drawCapsule(c));

  // Enemies
  enemies.forEach(e=>{
    if(e.type==='asteroid') drawAsteroid(e);
    else if(e.isBoss) drawBoss(e);
    else drawEnemy(e);
  });

  // Enemy bullets
  enemyBullets.forEach(b=>{
    ctx.fillStyle='#f55';
    ctx.shadowColor='#f55'; ctx.shadowBlur=4;
    ctx.fillRect(b.x-2,b.y-2,b.w||4,b.h||4);
    ctx.shadowBlur=0;
  });

  // Explosions
  explosions.forEach(e=>{
    const p=e.timer/(e.big?40:24);
    ctx.save();
    ctx.globalAlpha=p;
    const g=ctx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r*(1-p*0.3));
    g.addColorStop(0,'#fff');
    g.addColorStop(0.3,'#ff8');
    g.addColorStop(0.7,'#f40');
    g.addColorStop(1,'rgba(255,80,0,0)');
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(e.x,e.y,e.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });

  // Particles
  particles.forEach(p=>{
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life/50;
    ctx.fillRect(p.x-1,p.y-1,2,2);
  });
  ctx.globalAlpha=1;

  // Score popups
  scorePopups.forEach(s=>{
    ctx.font=(s.big?'8px':'6px')+' "Press Start 2P",monospace';
    ctx.fillStyle=s.color;
    ctx.globalAlpha=Math.min(1,s.life/30);
    ctx.textAlign='center';
    ctx.fillText(s.txt,s.x,s.y);
  });
  ctx.globalAlpha=1;

  drawHUD();
  if(paused) drawPaused();
}

function drawBG(){
  // Stars
  stars.forEach(s=>{
    ctx.fillStyle=`rgb(${s.bright},${s.bright},${s.bright})`;
    ctx.fillRect(s.x,s.y,s.r,s.r);
  });
  // Nebula wisps
  ctx.save();
  ctx.globalAlpha=0.04;
  [40,80,140,180].forEach((y,i)=>{
    const x=(bgScroll*0.3+i*90)%CW;
    const g=ctx.createRadialGradient(x,y,0,x,y,60);
    g.addColorStop(0,['#006','#040','#060','#004'][i%4]);
    g.addColorStop(1,'transparent');
    ctx.fillStyle=g;
    ctx.fillRect(0,0,CW,CH);
  });
  ctx.restore();
}

function drawTerrain(){
  if(stagePhase<1)return;
  // Simple scrolling ceiling/floor rocks in phase 1+
  const T=terrainScroll;
  terrainScroll=(terrainScroll+1.2)%64;
  ctx.fillStyle='#223355';
  // Ceiling
  for(let i=0;i<8;i++){
    const h=10+Math.floor(Math.sin((i+T/20)*0.9)*6);
    ctx.fillRect(i*40-T%40,0,40,h);
  }
  // Floor
  for(let i=0;i<8;i++){
    const h=10+Math.floor(Math.cos((i+T/20)*0.9)*6);
    ctx.fillRect(i*40-T%40,CH-h-32,40,h);
  }
}

function drawPlayer(){
  if(invincible>0&&Math.floor(invincible/4)%2===0)return;

  const x=px,y=py;
  // Ship body — pixel art Gradius-style fighter
  ctx.fillStyle='#88ccff';
  // Main fuselage
  ctx.fillRect(x+6,y+4,14,4);
  ctx.fillRect(x+4,y+3,18,6);
  ctx.fillRect(x+2,y+5,4,2);
  // Nose
  ctx.fillStyle='#fff';
  ctx.fillRect(x+20,y+5,4,2);
  ctx.fillRect(x+22,y+5,2,2);
  // Cockpit
  ctx.fillStyle='#00ccff';
  ctx.fillRect(x+12,y+4,6,4);
  // Wings
  ctx.fillStyle='#6699cc';
  ctx.fillRect(x+4,y+1,8,3);
  ctx.fillRect(x+4,y+8,8,3);
  // Engine glow
  ctx.fillStyle='#ff8800';
  ctx.shadowColor='#ff8800'; ctx.shadowBlur=6;
  ctx.fillRect(x,y+4,3,4);
  ctx.shadowBlur=0;
  // Engine exhaust flicker
  if(Math.random()<0.6){
    ctx.fillStyle='#ffcc00';
    ctx.fillRect(x-2-Math.floor(Math.random()*4),y+5,3,2);
  }

  // Shield ring
  if(shieldActive){
    ctx.save();
    ctx.strokeStyle='#0cf';
    ctx.shadowColor='#0cf'; ctx.shadowBlur=8;
    ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(x+pW/2,y+pH/2,pH,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function drawOption(ox,oy){
  ctx.save();
  ctx.fillStyle='#ff8c00';
  ctx.shadowColor='#ffa500'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.arc(ox+5,oy+5,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ffcc00';
  ctx.beginPath(); ctx.arc(ox+5,oy+5,3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawEnemy(e){
  ctx.save();
  if(e.type==='dart'){
    ctx.fillStyle='#ff4444';
    ctx.fillRect(e.x,e.y+2,12,6);
    ctx.fillRect(e.x+2,e.y,8,10);
    ctx.fillRect(e.x+8,e.y+3,6,4);
    ctx.fillStyle='#ff8888';
    ctx.fillRect(e.x+10,e.y+4,3,2);
  } else if(e.type==='fighter'){
    ctx.fillStyle='#cc3300';
    ctx.fillRect(e.x,e.y+4,16,5);
    ctx.fillRect(e.x+2,e.y+1,12,9);
    ctx.fillRect(e.x+10,e.y+3,8,5);
    ctx.fillStyle='#ff6600';
    ctx.fillRect(e.x+14,e.y+5,4,2);
    ctx.fillStyle='#ff0';
    ctx.fillRect(e.x+4,e.y+4,3,3);
  } else if(e.type==='heavy'){
    ctx.fillStyle='#882200';
    ctx.fillRect(e.x,e.y+4,20,8);
    ctx.fillRect(e.x+2,e.y,16,16);
    ctx.fillRect(e.x+14,e.y+5,8,6);
    ctx.fillStyle='#ff4400';
    ctx.fillRect(e.x+16,e.y+7,5,3);
    ctx.fillStyle='#ff0';
    ctx.fillRect(e.x+5,e.y+5,4,5);
  }
  ctx.restore();
}

function drawAsteroid(e){
  ctx.save();
  ctx.translate(e.x+e.w/2,e.y+e.h/2);
  ctx.rotate(e.rot||0);
  ctx.fillStyle='#887766';
  ctx.beginPath();
  const pts=8;
  for(let i=0;i<pts;i++){
    const a=(i/pts)*Math.PI*2;
    const r=e.w/2*(0.7+0.3*Math.sin(i*2.3));
    if(i===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
    else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='#665544';
  ctx.beginPath(); ctx.arc(-2,-2,4,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBoss(e){
  ctx.save();
  const x=e.x,y=e.y;
  // Main hull
  ctx.fillStyle='#334466';
  ctx.fillRect(x,y+10,e.w,e.h-20);
  ctx.fillRect(x+8,y,e.w-16,e.h);
  // Armor plates
  ctx.fillStyle='#223355';
  ctx.fillRect(x+2,y+12,12,e.h-24);
  ctx.fillRect(x+e.w-14,y+12,12,e.h-24);
  // Cannons
  ctx.fillStyle='#112233';
  ctx.fillRect(x-8,y+18,12,8);
  ctx.fillRect(x-8,y+e.h-26,12,8);
  // Core
  if(!e.coreDestroyed){
    const pulse=0.6+0.4*Math.sin(e.timer*0.15);
    ctx.fillStyle=`rgba(255,${Math.floor(100+100*pulse)},0,1)`;
    ctx.shadowColor='#f80'; ctx.shadowBlur=12*pulse;
    ctx.beginPath(); ctx.arc(x+e.w/2,y+e.h/2,10,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
  // HP bar
  const barW=e.w;
  ctx.fillStyle='#111';
  ctx.fillRect(x,y-8,barW,4);
  ctx.fillStyle=e.hp>e.maxHp/2?'#0f0':'#f80';
  ctx.fillRect(x,y-8,barW*(e.hp/e.maxHp),4);
  ctx.restore();
}

function drawCapsule(c){
  ctx.save();
  const pulse=0.7+0.3*Math.sin(c.timer*0.15);
  ctx.fillStyle='#ffcc00';
  ctx.shadowColor='#ffcc00'; ctx.shadowBlur=6*pulse;
  ctx.fillRect(c.x,c.y,12,12);
  ctx.fillStyle='#ff8800';
  ctx.fillRect(c.x+2,c.y+2,8,8);
  ctx.fillStyle='#fff';
  ctx.font='6px monospace';
  ctx.textAlign='center';
  ctx.fillText('P',c.x+6,c.y+9);
  ctx.restore();
}

function drawMissile(m){
  ctx.save();
  const ang=Math.atan2(m.vy,m.vx);
  ctx.translate(m.x,m.y);
  ctx.rotate(ang);
  ctx.fillStyle='#aaccff';
  ctx.fillRect(-2,-1,6,2);
  ctx.fillStyle='#ff8800';
  ctx.fillRect(-4,-1,3,2);
  ctx.restore();
}

function drawHUD(){
  // Top bar
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,CW,16);

  ctx.font='7px "Press Start 2P",monospace';
  ctx.textAlign='left';
  ctx.fillStyle='#0cf';
  ctx.fillText('SCORE',4,11);
  ctx.fillStyle='#fff';
  ctx.fillText(String(score).padStart(7,'0'),52,11);

  ctx.fillStyle='#0cf';
  ctx.textAlign='center';
  ctx.fillText('HI',CW/2-20,11);
  ctx.fillStyle='#ff0';
  ctx.fillText(String(hiScore).padStart(7,'0'),CW/2+20,11);

  ctx.fillStyle='#0cf';
  ctx.textAlign='right';
  ctx.fillText('STG'+stage,CW-4,11);

  // Power-up bar (bottom)
  const BH=20, BY=CH-BH;
  ctx.fillStyle='rgba(0,0,20,0.85)';
  ctx.fillRect(0,BY,CW,BH);
  ctx.strokeStyle='#0cf4';
  ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(0,BY); ctx.lineTo(CW,BY); ctx.stroke();

  const slotW=Math.floor(CW/POWERUP_SLOTS.length);
  POWERUP_SLOTS.forEach((s,i)=>{
    const sx=i*slotW, sy=BY+1;
    const active=powerCursor===i;
    if(active){
      ctx.fillStyle='rgba(0,200,255,0.25)';
      ctx.fillRect(sx+1,sy,slotW-2,BH-2);
    }
    ctx.font='4px "Press Start 2P",monospace';
    ctx.textAlign='center';
    ctx.fillStyle=active?'#0ff':'#556';
    ctx.fillText(s,sx+slotW/2,BY+12);
    if(active){
      ctx.strokeStyle='#0cf';
      ctx.lineWidth=1;
      ctx.strokeRect(sx+1,sy,slotW-2,BH-3);
    }
  });

  // Lives
  ctx.fillStyle='#0cf';
  ctx.font='6px "Press Start 2P",monospace';
  ctx.textAlign='left';
  ctx.fillText('× '+lives, 8, BY-6);
  // Mini ship icons
  for(let i=0;i<Math.min(lives-1,5);i++){
    drawMiniShip(32+i*16,BY-12);
  }
}

function drawMiniShip(x,y){
  ctx.fillStyle='#88ccff';
  ctx.fillRect(x+3,y+2,6,3);
  ctx.fillRect(x+2,y+2,8,4);
  ctx.fillStyle='#0f0';
  ctx.fillRect(x,y+3,2,2);
}

function drawPaused(){
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.fillRect(0,0,CW,CH);
  ctx.font='12px "Press Start 2P",monospace';
  ctx.fillStyle='#fff';
  ctx.textAlign='center';
  ctx.shadowColor='#0cf'; ctx.shadowBlur=16;
  ctx.fillText('PAUSED',CW/2,CH/2-6);
  ctx.shadowBlur=0;
  ctx.font='6px "Press Start 2P",monospace';
  ctx.fillStyle='#888';
  ctx.fillText('P to resume',CW/2,CH/2+12);
}

// ── Boot ──────────────────────────────────────────────────
initStars();
waves=makeWaves(stage);

// ── Title screen ────────────────────────────────────────
const titleEnemies=[
  {x:260,y:75, spd:0.7,type:'heavy'},
  {x:230,y:112,spd:0.9,type:'fighter'},
  {x:210,y:58, spd:0.8,type:'fighter'},
  {x:285,y:145,spd:0.6,type:'heavy'},
  {x:255,y:168,spd:0.75,type:'dart'},
  {x:198,y:142,spd:1.0, type:'dart'},
];
let titleFrame=0;
const shootingStars=[];

function drawTitleEnemy(e){
  const x=e.x,y=e.y;
  if(e.type==='dart'){
    ctx.fillStyle='#ff4444'; ctx.fillRect(x,y+2,12,6); ctx.fillRect(x+2,y,8,10);
    ctx.fillStyle='#ff8888'; ctx.fillRect(x+10,y+4,3,2);
  } else if(e.type==='fighter'){
    ctx.fillStyle='#cc3300'; ctx.fillRect(x,y+4,16,5); ctx.fillRect(x+2,y+1,12,9);
    ctx.fillStyle='#ff6600'; ctx.fillRect(x+14,y+5,4,2);
    ctx.fillStyle='#ff0';    ctx.fillRect(x+4,y+4,3,3);
  } else {
    ctx.fillStyle='#882200'; ctx.fillRect(x,y+4,20,8); ctx.fillRect(x+2,y,16,16);
    ctx.fillStyle='#ff4400'; ctx.fillRect(x+16,y+7,5,3);
    ctx.fillStyle='#ff0';    ctx.fillRect(x+5,y+5,4,5);
  }
}

(function titleLoop(){
  if(gameRunning)return;
  titleFrame++;
  ctx.fillStyle='#000810'; ctx.fillRect(0,0,CW,CH);

  // ── Deep nebula (max 4 radial fills)
  ctx.save();
  [{x:70, y:95, r:85, c:'rgba(0,18,70,0.6)'},
   {x:240,y:155,r:95, c:'rgba(28,0,55,0.55)'},
   {x:145,y:210,r:75, c:'rgba(0,38,28,0.5)'},
   {x:38, y:175,r:60, c:'rgba(0,8,45,0.45)'},
  ].forEach(n=>{
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,n.c); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  });
  ctx.restore();

  // ── Stars with twinkle
  stars.forEach(s=>{
    s.x-=s.spd*0.3; if(s.x<0)s.x=CW;
    const b=Math.floor(s.bright*(0.65+0.35*Math.abs(Math.sin(titleFrame*0.04+s.y*0.1))));
    ctx.fillStyle=`rgb(${b},${b},${Math.min(255,b+25)})`;
    ctx.fillRect(s.x,s.y,s.r,s.r);
  });

  // ── Shooting stars
  if(Math.random()<0.007) shootingStars.push({x:CW,y:5+Math.random()*55,vx:-5.5-Math.random()*4,vy:1.5+Math.random(),life:38});
  for(let i=shootingStars.length-1;i>=0;i--){
    const s=shootingStars[i];
    s.x+=s.vx; s.y+=s.vy; s.life--;
    if(s.life<=0){shootingStars.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=s.life/38;
    ctx.strokeStyle='#cce8ff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(s.x-s.vx*6,s.y-s.vy*6); ctx.stroke();
    ctx.restore();
  }

  // ── Large ringed planet (top-right)
  {
    ctx.save();
    const pr=52, pcx=CW-pr+18, pcy=52;
    // Planet body
    const pg=ctx.createRadialGradient(pcx-16,pcy-16,2,pcx,pcy,pr);
    pg.addColorStop(0,'#3a6ecc'); pg.addColorStop(0.55,'#1035aa'); pg.addColorStop(1,'#050820');
    ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(pcx,pcy,pr,0,Math.PI*2); ctx.fill();
    // Surface bands
    ctx.save(); ctx.beginPath(); ctx.arc(pcx,pcy,pr,0,Math.PI*2); ctx.clip();
    ctx.globalAlpha=0.1;
    for(const dy of[-16,-6,4,14,24]){
      ctx.fillStyle='#99bbff'; ctx.fillRect(pcx-pr,pcy+dy,pr*2,6);
    }
    ctx.restore();
    // Atmosphere rim
    const rim=ctx.createRadialGradient(pcx,pcy,pr-5,pcx,pcy,pr+5);
    rim.addColorStop(0,'rgba(80,130,255,0)'); rim.addColorStop(1,'rgba(80,170,255,0.3)');
    ctx.fillStyle=rim; ctx.beginPath(); ctx.arc(pcx,pcy,pr+5,0,Math.PI*2); ctx.fill();
    // Ring (behind half, then front half)
    ctx.save(); ctx.globalAlpha=0.28;
    ctx.strokeStyle='#88aaee'; ctx.lineWidth=5;
    ctx.beginPath(); ctx.ellipse(pcx,pcy+9,pr+26,11,-0.08,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    ctx.restore();
  }

  // ── Small cratered moon (bottom-left)
  {
    ctx.save();
    const mg=ctx.createRadialGradient(45,196,0,46,198,17);
    mg.addColorStop(0,'#5a6a7a'); mg.addColorStop(1,'#1a2030');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(47,198,17,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.arc(43,194,5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(53,203,3.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(40,204,2.5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ── Distant star cluster
  {
    ctx.save(); ctx.globalAlpha=0.4;
    for(let i=0;i<12;i++){
      const sx=140+Math.cos(i*0.9)*30, sy=40+Math.sin(i*1.1)*18;
      const bri=150+Math.floor(Math.sin(titleFrame*0.06+i)*40);
      ctx.fillStyle=`rgb(${bri},${bri},${Math.min(255,bri+40)})`;
      ctx.fillRect(sx,sy,i%3===0?2:1,i%3===0?2:1);
    }
    ctx.restore();
  }

  // ── Enemy formation (flies in from right)
  titleEnemies.forEach(e=>{
    e.x-=e.spd*(0.75+0.25*Math.sin(titleFrame*0.012));
    if(e.x<-30){e.x=CW+10+Math.random()*50; e.y=PLAY_TOP+14+Math.random()*(PLAY_BOT-PLAY_TOP-36);}
    ctx.save(); ctx.globalAlpha=0.78;
    // engine trail
    ctx.fillStyle='rgba(255,110,20,0.4)';
    ctx.fillRect(e.x-(6+Math.floor(Math.random()*7)),e.y+(e.type==='dart'?5:e.type==='fighter'?6:8),7,3);
    drawTitleEnemy(e);
    ctx.restore();
  });

  // ── Player ship (hero, hovering left-center)
  {
    const hx=28, hy=Math.round(CH/2-6+Math.sin(titleFrame*0.05)*4);
    // Exhaust glow
    ctx.save();
    const exLen=8+Math.floor(Math.random()*8);
    ctx.fillStyle='rgba(255,140,30,0.5)'; ctx.fillRect(hx-exLen,hy+4,exLen,4);
    ctx.fillStyle='rgba(255,220,80,0.65)'; ctx.fillRect(hx-Math.floor(exLen*0.5),hy+5,Math.floor(exLen*0.5),2);
    ctx.restore();
    // Laser beam
    ctx.save(); ctx.globalAlpha=0.35+0.2*Math.sin(titleFrame*0.12);
    const lg=ctx.createLinearGradient(hx+24,0,CW-30,0);
    lg.addColorStop(0,'#0ff'); lg.addColorStop(1,'rgba(0,255,255,0)');
    ctx.strokeStyle=lg; ctx.lineWidth=2;
    ctx.shadowColor='#0ff'; ctx.shadowBlur=7;
    ctx.beginPath(); ctx.moveTo(hx+24,hy+6); ctx.lineTo(CW-30,hy+6); ctx.stroke();
    ctx.restore();
    // Ship
    ctx.fillStyle='#88ccff';
    ctx.fillRect(hx+6,hy+4,14,4); ctx.fillRect(hx+4,hy+3,18,6);
    ctx.fillStyle='#fff';    ctx.fillRect(hx+20,hy+5,4,2);
    ctx.fillStyle='#0cf';    ctx.fillRect(hx+12,hy+4,6,4);
    ctx.fillStyle='#6699cc'; ctx.fillRect(hx+4,hy+1,8,3); ctx.fillRect(hx+4,hy+8,8,3);
    ctx.fillStyle='#ff8800'; ctx.shadowColor='#ff8800'; ctx.shadowBlur=5;
    ctx.fillRect(hx,hy+4,3,4); ctx.shadowBlur=0;
    // Option drone
    const ox=hx-18, oy=hy+6+Math.round(Math.sin(titleFrame*0.08+1)*5);
    ctx.fillStyle='#ff8c00'; ctx.shadowColor='#ffa500'; ctx.shadowBlur=5;
    ctx.beginPath(); ctx.arc(ox,oy,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.arc(ox,oy,3,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }

  if(!gameRunning)requestAnimationFrame(titleLoop);
})();

showOverlay('');
</script>
